<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老年人能力评估系统</title>
    <link rel="stylesheet" href="terminal-v2/style.css">
    <style>
        .block h2 { border-left-color: #2980b9; }
        .dim-tabs { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .dim-tab { padding: 14px 24px; border-radius: 10px; background: #ecf0f1; font-size: 20px; font-weight: bold; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .dim-tab.active { background: #2980b9; color: white; border-color: #2980b9; }
        .dim-tab.done { background: #e8f8f0; border-color: #27ae60; color: #27ae60; }
        .dim-panel { display: none; }
        .dim-panel.active { display: block; }
        .q-card { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 14px 0; border-left: 4px solid #2980b9; }
        .q-card h4 { font-size: 20px; color: #2c3e50; margin-bottom: 12px; }
        .q-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .q-opt { padding: 12px 20px; border-radius: 8px; border: 2px solid #ddd; background: white; font-size: 18px; cursor: pointer; transition: all 0.2s; }
        .q-opt:active { transform: scale(0.96); }
        .q-opt.selected { border-color: #2980b9; background: #e8f4fd; color: #2980b9; font-weight: bold; }
        .score-display { text-align: center; padding: 30px; margin: 20px 0; border-radius: 16px; background: #f8f9fa; }
        .score-display .total { font-size: 64px; font-weight: bold; color: #2c3e50; }
        .score-display .level { font-size: 32px; margin-top: 10px; font-weight: bold; padding: 8px 30px; border-radius: 10px; display: inline-block; }
        .level-0 { background: #e8f8f0; color: #1e8449; }
        .level-1 { background: #e8f4fd; color: #2471a3; }
        .level-2 { background: #fef9e7; color: #d68910; }
        .level-3 { background: #fdecea; color: #c0392b; }
        .dim-score { font-size: 16px; color: #7f8c8d; margin-top: 6px; }
        .nav-btns { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
        .nav-btns button { padding: 14px 40px; border-radius: 10px; font-size: 20px; cursor: pointer; border: none; transition: all 0.2s; }
        .nav-btns .btn-prev { background: #ecf0f1; color: #333; }
        .nav-btns .btn-next { background: #2980b9; color: white; }
        .nav-btns .btn-result { background: #27ae60; color: white; }
        .nav-btns button:active { transform: scale(0.96); }
        .result-section { display: none; }
        .result-table td.score-cell { font-weight: bold; color: #2980b9; font-size: 20px; }
        .notice { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="page-header">
            <h1>老年人能力评估系统</h1>
            <p class="sub">依据GB/T 42195-2022，逐项评估，自动计算等级</p>
        </div>

        <div class="notice">
            ⚠️ 本工具辅助评估师进行标准化评估，最终结果需由持证评估师确认签字。不作为医学诊断依据。
        </div>

        <div class="block" id="assessBlock">
            <h2>开始评估</h2>
            <div class="dim-tabs" id="dimTabs"></div>
            <div id="dimPanels"></div>
            <div class="nav-btns" id="navBtns">
                <button class="btn-prev" onclick="prevDim()">上一维度</button>
                <button class="btn-next" onclick="nextDim()">下一维度</button>
            </div>
        </div>

        <div class="block result-section" id="resultSection">
            <h2>评估结果</h2>
            <div class="score-display">
                <div class="total" id="totalScore">0</div>
                <div>总分</div>
                <div class="level" id="levelText"></div>
            </div>
            <table class="data-table" id="resultTable">
                <thead><tr><th>评估维度</th><th>得分</th><th>满分</th></tr></thead>
                <tbody></tbody>
            </table>
            <div class="nav-btns" style="margin-top:20px;">
                <button class="btn-prev" onclick="resetAssess()">重新评估</button>
                <button class="btn-result" onclick="window.print()">打印结果</button>
            </div>
        </div>

        <div class="block" style="margin-top:30px;">
            <h2>专项评估工具</h2>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;">
                <a href="assess-morse.html" style="display:block;padding:16px;background:#fdecea;border-radius:10px;text-decoration:none;color:#c0392b;font-weight:bold;text-align:center;">Morse跌倒风险</a>
                <a href="assess-braden.html" style="display:block;padding:16px;background:#f5eef8;border-radius:10px;text-decoration:none;color:#6c3483;font-weight:bold;text-align:center;">Braden压疮风险</a>
                <a href="assess-mna.html" style="display:block;padding:16px;background:#fef9e7;border-radius:10px;text-decoration:none;color:#d68910;font-weight:bold;text-align:center;">MNA营养风险</a>
                <a href="assess-mmse.html" style="display:block;padding:16px;background:#e8f4fd;border-radius:10px;text-decoration:none;color:#2471a3;font-weight:bold;text-align:center;">MMSE认知筛查</a>
                <a href="assess-gds.html" style="display:block;padding:16px;background:#f4ecf7;border-radius:10px;text-decoration:none;color:#5b2c6f;font-weight:bold;text-align:center;">GDS抑郁量表</a>
                <a href="assess-pain.html" style="display:block;padding:16px;background:#fef5e7;border-radius:10px;text-decoration:none;color:#d35400;font-weight:bold;text-align:center;">疼痛评估</a>
                <a href="assess-swallow.html" style="display:block;padding:16px;background:#e8f8f5;border-radius:10px;text-decoration:none;color:#148f77;font-weight:bold;text-align:center;">吞咽功能筛查</a>
                <a href="assess-restraint.html" style="display:block;padding:16px;background:#f2f3f4;border-radius:10px;text-decoration:none;color:#2c3e50;font-weight:bold;text-align:center;">约束必要性评估</a>
                <a href="assess-incontinence.html" style="display:block;padding:16px;background:#eaf2f8;border-radius:10px;text-decoration:none;color:#1a5276;font-weight:bold;text-align:center;">排泄功能评估</a>
            </div>
        </div>

        <div class="page-footer">
            <a class="footer-btn" href="index.html">返回首页</a>
            <p class="disclaimer">思德库养老能力支持终端</p>
        </div>
    </div>
    <script>
        const dimensions = [
            {
                name: '日常生活活动',
                questions: [
                    { title: '1. 进食', opts: [{text:'独立',score:0},{text:'需部分帮助',score:1},{text:'需大量帮助',score:2},{text:'完全依赖',score:3}] },
                    { title: '2. 洗澡', opts: [{text:'独立',score:0},{text:'需部分帮助',score:1},{text:'需大量帮助',score:2},{text:'完全依赖',score:3}] },
                    { title: '3. 修饰（洗脸、刷牙、梳头）', opts: [{text:'独立',score:0},{text:'需部分帮助',score:1},{text:'需大量帮助',score:2},{text:'完全依赖',score:3}] },
                    { title: '4. 穿衣', opts: [{text:'独立',score:0},{text:'需部分帮助',score:1},{text:'需大量帮助',score:2},{text:'完全依赖',score:3}] },
                    { title: '5. 大便控制', opts: [{text:'可控制',score:0},{text:'偶尔失禁',score:1},{text:'经常失禁',score:2},{text:'完全失禁',score:3}] },
                    { title: '6. 小便控制', opts: [{text:'可控制',score:0},{text:'偶尔失禁',score:1},{text:'经常失禁',score:2},{text:'完全失禁',score:3}] },
                    { title: '7. 如厕', opts: [{text:'独立',score:0},{text:'需部分帮助',score:1},{text:'需大量帮助',score:2},{text:'完全依赖',score:3}] },
                    { title: '8. 床椅转移', opts: [{text:'独立',score:0},{text:'需部分帮助',score:1},{text:'需大量帮助',score:2},{text:'完全依赖',score:3}] },
                    { title: '9. 平地行走', opts: [{text:'独立',score:0},{text:'需部分帮助',score:1},{text:'需大量帮助',score:2},{text:'完全依赖',score:3}] },
                    { title: '10. 上下楼梯', opts: [{text:'独立',score:0},{text:'需部分帮助',score:1},{text:'需大量帮助',score:2},{text:'完全依赖',score:3}] }
                ]
            },
            {
                name: '精神状态',
                questions: [
                    { title: '1. 认知功能（时间定向）', opts: [{text:'正确回答年月日',score:0},{text:'回答部分正确',score:1},{text:'完全不能回答',score:2}] },
                    { title: '2. 认知功能（地点定向）', opts: [{text:'知道所在地',score:0},{text:'部分知道',score:1},{text:'完全不知道',score:2}] },
                    { title: '3. 认知功能（人物定向）', opts: [{text:'认识周围人',score:0},{text:'部分认识',score:1},{text:'完全不认识',score:2}] },
                    { title: '4. 短期记忆力', opts: [{text:'正常',score:0},{text:'轻度下降',score:1},{text:'明显下降',score:2},{text:'严重下降',score:3}] },
                    { title: '5. 情绪与行为', opts: [{text:'正常',score:0},{text:'偶有情绪波动',score:1},{text:'经常焦虑或抑郁',score:2},{text:'严重精神行为异常',score:3}] },
                    { title: '6. 理解与执行指令', opts: [{text:'能理解并执行',score:0},{text:'需简化指令',score:1},{text:'仅理解简单指令',score:2},{text:'无法理解',score:3}] }
                ]
            },
            {
                name: '感知觉与沟通',
                questions: [
                    { title: '1. 视力', opts: [{text:'正常',score:0},{text:'轻度障碍（可辅助）',score:1},{text:'中度障碍',score:2},{text:'重度障碍/失明',score:3}] },
                    { title: '2. 听力', opts: [{text:'正常',score:0},{text:'轻度障碍（可辅助）',score:1},{text:'中度障碍',score:2},{text:'重度障碍/失聪',score:3}] },
                    { title: '3. 语言表达', opts: [{text:'正常表达',score:0},{text:'表达不够清晰',score:1},{text:'仅能说简单词语',score:2},{text:'无法表达',score:3}] },
                    { title: '4. 理解他人', opts: [{text:'正常理解',score:0},{text:'需放慢/重复',score:1},{text:'仅理解简单内容',score:2},{text:'无法理解',score:3}] }
                ]
            },
            {
                name: '社会参与',
                questions: [
                    { title: '1. 时间/空间定向', opts: [{text:'正常',score:0},{text:'部分障碍',score:1},{text:'严重障碍',score:2}] },
                    { title: '2. 生活自理能力（使用电话、购物等）', opts: [{text:'独立',score:0},{text:'需部分帮助',score:1},{text:'需大量帮助',score:2},{text:'完全依赖',score:3}] },
                    { title: '3. 社交参与', opts: [{text:'主动参与',score:0},{text:'被动参与',score:1},{text:'很少参与',score:2},{text:'完全不参与',score:3}] },
                    { title: '4. 适应环境变化', opts: [{text:'能适应',score:0},{text:'需要时间适应',score:1},{text:'难以适应',score:2},{text:'无法适应',score:3}] }
                ]
            }
        ];

        let currentDim = 0;
        const answers = {};

        function renderTabs() {
            const tabs = document.getElementById('dimTabs');
            tabs.innerHTML = '';
            dimensions.forEach((dim, i) => {
                const tab = document.createElement('div');
                tab.className = 'dim-tab' + (i === currentDim ? ' active' : '');
                if (isDimDone(i)) tab.classList.add('done');
                tab.textContent = dim.name;
                tab.onclick = () => { currentDim = i; render(); };
                tabs.appendChild(tab);
            });
        }

        function renderPanel() {
            const panels = document.getElementById('dimPanels');
            panels.innerHTML = '';
            const dim = dimensions[currentDim];
            dim.questions.forEach((q, qi) => {
                const key = currentDim + '_' + qi;
                const card = document.createElement('div');
                card.className = 'q-card';
                let optsHtml = '';
                q.opts.forEach((opt, oi) => {
                    const sel = answers[key] === oi ? ' selected' : '';
                    optsHtml += `<div class="q-opt${sel}" onclick="selectOpt(${qi},${oi})">${opt.text}（${opt.score}分）</div>`;
                });
                card.innerHTML = `<h4>${q.title}</h4><div class="q-options">${optsHtml}</div>`;
                panels.appendChild(card);
            });
        }

        function renderNav() {
            const nav = document.getElementById('navBtns');
            const isFirst = currentDim === 0;
            const isLast = currentDim === dimensions.length - 1;
            let html = '';
            if (!isFirst) html += '<button class="btn-prev" onclick="prevDim()">上一维度</button>';
            if (!isLast) html += '<button class="btn-next" onclick="nextDim()">下一维度</button>';
            if (isLast) html += '<button class="btn-result" onclick="showResult()">计算结果</button>';
            nav.innerHTML = html;
        }

        function render() {
            renderTabs();
            renderPanel();
            renderNav();
        }

        function selectOpt(qi, oi) {
            const key = currentDim + '_' + qi;
            answers[key] = oi;
            render();
        }

        function isDimDone(dimIdx) {
            const dim = dimensions[dimIdx];
            for (let i = 0; i < dim.questions.length; i++) {
                if (answers[dimIdx + '_' + i] === undefined) return false;
            }
            return true;
        }

        function prevDim() { if (currentDim > 0) { currentDim--; render(); } }
        function nextDim() { if (currentDim < dimensions.length - 1) { currentDim++; render(); } }

        function calcDimScore(dimIdx) {
            const dim = dimensions[dimIdx];
            let score = 0;
            dim.questions.forEach((q, qi) => {
                const key = dimIdx + '_' + qi;
                if (answers[key] !== undefined) {
                    score += q.opts[answers[key]].score;
                }
            });
            return score;
        }

        function calcDimMax(dimIdx) {
            const dim = dimensions[dimIdx];
            let max = 0;
            dim.questions.forEach(q => { max += q.opts[q.opts.length - 1].score; });
            return max;
        }

        function showResult() {
            let total = 0;
            const tbody = document.querySelector('#resultTable tbody');
            tbody.innerHTML = '';
            dimensions.forEach((dim, i) => {
                const s = calcDimScore(i);
                const m = calcDimMax(i);
                total += s;
                tbody.innerHTML += `<tr><td>${dim.name}</td><td class="score-cell">${s}分</td><td>${m}分</td></tr>`;
            });
            tbody.innerHTML += `<tr style="font-weight:bold;background:#f0f8ff;"><td>合计</td><td class="score-cell">${total}分</td><td>—</td></tr>`;

            document.getElementById('totalScore').textContent = total;
            const levelEl = document.getElementById('levelText');
            let level, cls;
            if (total <= 3) { level = '能力完好（0级）'; cls = 'level-0'; }
            else if (total <= 7) { level = '轻度失能（1级）'; cls = 'level-1'; }
            else if (total <= 14) { level = '中度失能（2级）'; cls = 'level-2'; }
            else { level = '重度失能（3级）'; cls = 'level-3'; }
            levelEl.textContent = level;
            levelEl.className = 'level ' + cls;

            document.getElementById('assessBlock').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function resetAssess() {
            Object.keys(answers).forEach(k => delete answers[k]);
            currentDim = 0;
            document.getElementById('assessBlock').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            render();
            window.scrollTo(0, 0);
        }

        render();
    </script>
</body>
</html>
