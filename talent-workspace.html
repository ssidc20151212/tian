<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人才工作台 · CareProof AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
.workspace { max-width:1000px; margin:0 auto; padding:32px 24px; }
.ws-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:36px; padding-bottom:20px; border-bottom:1px solid var(--cp-bg-soft);
}
.ws-header h1 { font-family:'Noto Serif SC',serif; font-size:24px; color:var(--cp-text-dark); }
.ws-header .role-badge { font-size:12px; padding:4px 12px; background:var(--cp-accent);
  color:#fff; border-radius:12px; font-weight:600; }
.ws-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; margin-bottom:40px; }
.ws-card { padding:28px 24px; }
.ws-card h3 { font-size:17px; color:var(--cp-text-dark); margin-bottom:8px; font-weight:700; }
.ws-card p { font-size:13px; color:var(--cp-text-light); margin-bottom:16px; line-height:1.7; }
.section-title { font-family:'Noto Serif SC',serif; font-size:20px;
  color:var(--cp-text-dark); margin-bottom:20px; font-weight:700; }
.profile-summary {
  background:#fff; border-radius:var(--cp-radius); padding:24px;
  box-shadow:var(--cp-shadow); border:1px solid var(--cp-bg-soft); margin-bottom:32px;
}
.profile-row { display:grid; grid-template-columns:120px 1fr; gap:8px; margin-bottom:10px; font-size:14px; }
.profile-row .label { color:var(--cp-text-light); font-weight:600; }
.score-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:16px; }
.score-item { text-align:center; padding:12px; background:var(--cp-bg-gray); border-radius:8px; }
.score-item .val { font-size:24px; font-weight:700; color:var(--cp-primary); }
.score-item .lbl { font-size:11px; color:var(--cp-text-light); margin-top:4px; }
.evidence-list { list-style:none; }
.evidence-item {
  background:#fff; border-radius:10px; padding:16px 20px; margin-bottom:12px;
  box-shadow:var(--cp-shadow); border:1px solid var(--cp-bg-soft);
  display:flex; justify-content:space-between; align-items:center;
}
.evidence-item h4 { font-size:14px; color:var(--cp-text-dark); margin-bottom:4px; }
.evidence-item .meta { font-size:12px; color:var(--cp-text-light); }
</style>
</head>
<body>
<script src="data-model.js"></script>
<script>
CP.boot();
if (!CP.requireRole('talent')) { /* redirected */ }
</script>
<!-- 导航 -->
<nav class="cp-navbar">
  <div class="cp-nav-inner">
    <a href="capability-platform.html" class="cp-nav-brand">思德库</a>
    <div class="cp-nav-links" id="navLinks">
      <a href="talent-workspace.html">工作台</a>
      <a href="find-talent.html">能力档案</a>
      <span class="cp-nav-user" id="navUser"></span>
      <button class="cp-nav-logout" onclick="CP.logout()">退出</button>
    </div>
  </div>
</nav>
<div class="workspace" id="workspace">
  <div class="ws-header">
    <h1 id="wsTitle">人才工作台</h1>
    <span class="role-badge">专业人才</span>
  </div>
  <!-- 快捷入口卡片 -->
  <div class="ws-cards">
    <div class="cp-card ws-card">
      <h3>我的能力档案</h3>
      <p>查看六维能力评分、验证等级和公开档案预览</p>
      <a href="#profile" class="cp-btn cp-btn-primary cp-btn-sm" onclick="showSection('profile')">查看档案</a>
    </div>
    <div class="cp-card ws-card">
      <h3>提交能力证据</h3>
      <p>上传项目经历、评估报告、培训记录等证据材料</p>
      <a href="evidence-upload.html" class="cp-btn cp-btn-accent cp-btn-sm">提交证据</a>
    </div>
    <div class="cp-card ws-card">
      <h3>匹配通知</h3>
      <p>查看机构问题匹配到我的记录和当前状态</p>
      <a href="#matches" class="cp-btn cp-btn-outline cp-btn-sm" onclick="showSection('matches')">查看匹配</a>
    </div>
  </div>
  <!-- 能力档案 -->
  <section id="sec-profile" style="display:none;">
    <h2 class="section-title">我的能力档案</h2>
    <div class="profile-summary" id="profileSummary"></div>
    <h3 class="section-title" style="font-size:17px;">已提交的能力证据</h3>
    <ul class="evidence-list" id="evidenceList"></ul>
  </section>
  <!-- 匹配记录 -->
  <section id="sec-matches" style="display:none;">
    <h2 class="section-title">匹配到我的需求</h2>
    <div id="matchList" class="cp-empty">暂无匹配记录</div>
  </section>
</div>
<script src="talent-workspace.js"></script>
</body>
</html>
