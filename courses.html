<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>养老护理员技能考试精讲 — 思德库网络学苑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(160deg, #1a1a2e 0%, #2d2d44 50%, #1a1a2e 100%);
            color: #e8e8ec;
            min-height: 100vh;
        }
        .page-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .page-header h1 {
            font-size: 42px;
            color: #fff;
            margin-bottom: 12px;
        }
        .page-header .brand {
            color: #FF8C42;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .page-header .sub {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
        }
        .divider {
            height: 3px;
            background: linear-gradient(90deg, #FF8C42, #FFD166, #FF8C42);
            border-radius: 2px;
            margin: 0 auto 48px;
            max-width: 400px;
        }
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }
        .course-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,140,66,0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(255,140,66,0.15);
            border-color: rgba(255,140,66,0.5);
        }
        .card-video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
            display: block;
        }
        .card-body {
            padding: 20px 24px;
        }
        .card-num {
            display: inline-block;
            background: linear-gradient(135deg, #FF8C42, #FFD166);
            color: #1a1a2e;
            font-weight: 700;
            font-size: 13px;
            padding: 3px 10px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .card-body h3 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 10px;
        }
        .card-body p {
            font-size: 14px;
            color: rgba(255,255,255,0.65);
            line-height: 1.7;
        }
        .card-audio {
            padding: 0 24px 20px;
        }
        .card-audio audio {
            width: 100%;
            height: 36px;
            border-radius: 18px;
        }
        .page-footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .page-footer p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #FFD166;
            text-decoration: none;
            font-size: 15px;
        }
        .back-link:hover { text-decoration: underline; }
        @media (max-width: 768px) {
            .page-header h1 { font-size: 28px; }
            .course-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <a href="index.html" class="back-link">← 返回首页</a>
        <div class="page-header">
            <p class="brand">思德库网络学苑</p>
            <h1>养老护理员技能考试精讲</h1>
            <p class="sub">涵盖国标全模块 · 7门系统课程 · 考点精讲</p>
        </div>
        <div class="divider"></div>
        <div class="course-grid" id="courseGrid"></div>
        <div class="page-footer">
            <p>本课程用于养老护理员技能等级考试备考参考，内容依据国家职业技能标准编制。</p>
        </div>
    </div>
<script>
const courses = [
    {
        num: 1, title: "生活照料",
        desc: "饮食照料、排泄照料、睡眠照料、清洁照料四大实操考核重点。",
        video: "output/视频1-生活照料.mp4",
        audio: "output/视频1-生活照料.mp3"
    },
    {
        num: 2, title: "基础护理",
        desc: "体温脉搏血压呼吸测量、给药、压疮预防、冷热疗法操作要点。",
        video: "output/视频2-基础护理.mp4",
        audio: "output/视频2-基础护理.mp3"
    },
    {
        num: 3, title: "康复护理",
        desc: "体位转移、肢体康复训练、辅助器具使用三大模块精讲。",
        video: "output/视频3-康复护理.mp4",
        audio: "output/视频3-康复护理.mp3"
    },
    {
        num: 4, title: "心理护理与安全防护",
        desc: "心理疏导、沟通技巧、噎食急救、跌倒防护核心考点。",
        video: "output/视频4-心理护理与安全防护.mp4",
        audio: "output/视频4-心理护理与安全防护.mp3"
    },
    {
        num: 5, title: "消毒防护与感染控制",
        desc: "六步洗手法、物品消毒配比、隔离衣穿脱、安全用氧、排痰护理。",
        video: "output/视频5-消毒防护与感染控制.mp4",
        audio: "output/视频5-消毒防护与感染控制.mp3"
    },
    {
        num: 6, title: "失智照护与临终关怀",
        desc: "失智老人认知评估与行为管理、临终舒适护理、尸体料理、家属支持。",
        video: "output/视频6-失智照护与临终关怀.mp4",
        audio: "output/视频6-失智照护与临终关怀.mp3"
    },
    {
        num: 7, title: "照护管理与环境安全",
        desc: "护理计划制定、管道护理、约束带使用、消防安全、营养评估。",
        video: "output/视频7-照护管理与环境安全.mp4",
        audio: "output/视频7-照护管理与环境安全.mp3"
    }
];

const grid = document.getElementById("courseGrid");
courses.forEach(c => {
    grid.innerHTML += `
    <div class="course-card">
        <video class="card-video" controls preload="metadata" poster="">
            <source src="${c.video}" type="video/mp4">
        </video>
        <div class="card-body">
            <span class="card-num">第${c.num}课</span>
            <h3>${c.title}</h3>
            <p>${c.desc}</p>
        </div>
        <div class="card-audio">
            <audio controls preload="none">
                <source src="${c.audio}" type="audio/mpeg">
            </audio>
        </div>
    </div>`;
});
</script>
</body>
</html>
