<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braden压疮风险评估</title>
    <link rel="stylesheet" href="terminal-v2/style.css">
    <style>
        .block h2 { border-left-color: #8e44ad; }
        .q-card { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 14px 0; border-left: 4px solid #8e44ad; }
        .q-card h4 { font-size: 20px; color: #2c3e50; margin-bottom: 12px; }
        .q-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .q-opt { padding: 12px 18px; border-radius: 8px; border: 2px solid #ddd; background: white; font-size: 17px; cursor: pointer; transition: all 0.2s; }
        .q-opt:active { transform: scale(0.96); }
        .q-opt.selected { border-color: #8e44ad; background: #f5eef8; color: #6c3483; font-weight: bold; }
        .score-display { text-align: center; padding: 30px; margin: 20px 0; border-radius: 16px; background: #f8f9fa; display: none; }
        .score-display .total { font-size: 64px; font-weight: bold; }
        .score-display .level { font-size: 28px; margin-top: 10px; font-weight: bold; padding: 8px 30px; border-radius: 10px; display: inline-block; }
        .level-low { background: #e8f8f0; color: #1e8449; }
        .level-mid { background: #fef9e7; color: #d68910; }
        .level-high { background: #fdecea; color: #c0392b; }
        .suggest-box { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 16px 0; display: none; }
        .nav-btns { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
        .nav-btns button { padding: 14px 40px; border-radius: 10px; font-size: 20px; cursor: pointer; border: none; }
        .nav-btns .btn-calc { background: #8e44ad; color: white; }
        .nav-btns .btn-reset { background: #ecf0f1; color: #333; }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="page-header">
            <h1>Braden压疮风险评估</h1>
            <p class="sub">识别压疮高危老人，及时采取预防措施</p>
        </div>
        <div class="notice">Braden量表总分越低，压疮风险越高。本工具用于照护参考，不作为医学诊断依据。</div>
        <div class="block">
            <h2>逐项评估</h2>
            <div id="questions"></div>
        </div>
        <div class="nav-btns">
            <button class="btn-reset" onclick="resetAll()">重新评估</button>
            <button class="btn-calc" onclick="calcResult()">计算结果</button>
        </div>
        <div class="score-display" id="result">
            <div class="total" id="totalScore">0</div>
            <div>总分（满分23分，分数越低风险越高）</div>
            <div class="level" id="levelText"></div>
        </div>
        <div class="suggest-box" id="suggestBox"></div>
        <div class="page-footer">
            <a class="footer-btn" href="index.html">返回首页</a>
            <p class="disclaimer">思德库养老能力支持终端</p>
        </div>
    </div>
    <script>
        const items = [
            { title:'1. 感知觉（对压力引起不适的反应能力）', opts:[{text:'完全受限（1分）',score:1},{text:'非常受限（2分）',score:2},{text:'轻度受限（3分）',score:3},{text:'未受损（4分）',score:4}] },
            { title:'2. 潮湿程度（皮肤暴露于潮湿的程度）', opts:[{text:'持续潮湿（1分）',score:1},{text:'经常潮湿（2分）',score:2},{text:'偶尔潮湿（3分）',score:3},{text:'很少潮湿（4分）',score:4}] },
            { title:'3. 活动能力（身体活动程度）', opts:[{text:'卧床不起（1分）',score:1},{text:'限于椅上（2分）',score:2},{text:'偶尔行走（3分）',score:3},{text:'经常行走（4分）',score:4}] },
            { title:'4. 移动能力（改变和控制体位的能力）', opts:[{text:'完全不能（1分）',score:1},{text:'严重受限（2分）',score:2},{text:'轻微受限（3分）',score:3},{text:'不受限（4分）',score:4}] },
            { title:'5. 营养状况（通常的进食情况）', opts:[{text:'非常差（1分）',score:1},{text:'可能不足（2分）',score:2},{text:'足够（3分）',score:3},{text:'良好（4分）',score:4}] },
            { title:'6. 摩擦力和剪切力', opts:[{text:'存在问题（1分）',score:1},{text:'潜在问题（2分）',score:2},{text:'无明显问题（3分）',score:3}] }
        ];
        const answers = {};
        function renderQ() {
            const box = document.getElementById('questions');
            box.innerHTML = '';
            items.forEach((q, qi) => {
                let optsHtml = '';
                q.opts.forEach((opt, oi) => {
                    const sel = answers[qi] === oi ? ' selected' : '';
                    optsHtml += `<div class="q-opt${sel}" onclick="sel(${qi},${oi})">${opt.text}</div>`;
                });
                box.innerHTML += `<div class="q-card"><h4>${q.title}</h4><div class="q-options">${optsHtml}</div></div>`;
            });
        }
        function sel(qi, oi) { answers[qi] = oi; renderQ(); }
        function calcResult() {
            let total = 0;
            items.forEach((q, qi) => { if(answers[qi]!==undefined) total += q.opts[answers[qi]].score; });
            document.getElementById('totalScore').textContent = total;
            const el = document.getElementById('levelText');
            const sb = document.getElementById('suggestBox');
            if(total <= 12) { el.textContent='高风险'; el.className='level level-high'; sb.innerHTML='<h3 style="color:#c0392b;">高风险照护建议</h3><p>1. 每2小时翻身一次<br>2. 使用减压气垫床<br>3. 每日皮肤检查2次<br>4. 加强营养支持<br>5. 保持皮肤清洁干燥<br>6. 3天后复评</p>'; }
            else if(total <= 14) { el.textContent='中风险'; el.className='level level-mid'; sb.innerHTML='<h3 style="color:#d68910;">中风险照护建议</h3><p>1. 每2—3小时翻身<br>2. 使用减压垫<br>3. 每日皮肤检查<br>4. 注意营养摄入<br>5. 7天后复评</p>'; }
            else if(total <= 18) { el.textContent='轻度风险'; el.className='level level-mid'; sb.innerHTML='<h3 style="color:#d68910;">轻度风险照护建议</h3><p>1. 鼓励自主活动和翻身<br>2. 定期皮肤观察<br>3. 保持皮肤清洁<br>4. 14天后复评</p>'; }
            else { el.textContent='低风险'; el.className='level level-low'; sb.innerHTML='<h3 style="color:#1e8449;">低风险</h3><p>维持现有照护方式，30天后常规复评。</p>'; }
            document.getElementById('result').style.display = 'block';
            sb.style.display = 'block';
        }
        function resetAll() { Object.keys(answers).forEach(k=>delete answers[k]); document.getElementById('result').style.display='none'; document.getElementById('suggestBox').style.display='none'; renderQ(); }
        renderQ();
    </script>
</body>
</html>
