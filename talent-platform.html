<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思德库 · 正在跳转</title>
<link rel="stylesheet" href="common.css">
<style>
body {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#1a5276 0%,#2980b9 50%,#FF8C42 100%);
  color:#fff; font-family:-apple-system,"PingFang SC",sans-serif;
}
.loading {
  text-align:center; padding:40px;
  background:rgba(255,255,255,0.1); border-radius:16px;
  backdrop-filter:blur(10px);
}
.spinner {
  width:40px; height:40px; margin:0 auto 16px;
  border:3px solid rgba(255,255,255,0.3);
  border-top-color:#fff; border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <div id="msg">正在为您分配到合适的工作台...</div>
</div>
<script src="data-model.js"></script>
<script>
/* talent-platform.html —— 兼容旧链接的轻量路由分发器
 * 保留此文件仅用于兼容已经外部引用的旧地址。
 * 根据当前登录状态和角色，跳转到对应的新工作台页面。
 */
(function () {
  if (window.CP && CP.boot) CP.boot();
  var user = CP.currentUser();
  var msg = document.getElementById('msg');
  var target;
  if (!user) {
    msg.textContent = '未登录，正在跳转到登录页...';
    target = 'login.html';
  } else if (user.role === 'talent') {
    target = 'talent-workspace.html';
  } else if (user.role === 'institution') {
    target = 'institution-workspace.html';
  } else if (user.role === 'admin') {
    target = 'admin-console.html';
  } else {
    target = 'capability-platform.html';
  }
  setTimeout(function(){ CP.safeReplace(target); }, 300);
})();
</script>
</body>
</html>
