<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>匹配结果 · CareProof AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
.page-wrap { max-width:960px; margin:0 auto; padding:40px 24px; }
.page-title { font-family:'Noto Serif SC',serif; font-size:26px; color:var(--cp-text-dark);
  margin-bottom:8px; font-weight:700; }
.need-brief {
  background:#fff; border-radius:var(--cp-radius); padding:20px 24px;
  box-shadow:var(--cp-shadow); border:1px solid var(--cp-bg-soft); margin-bottom:24px;
}
.need-brief h3 { font-size:17px; color:var(--cp-text-dark); margin-bottom:8px; }
.need-brief .meta { font-size:13px; color:var(--cp-text-light); margin-bottom:8px; }
.need-brief .desc { font-size:14px; color:var(--cp-text-body); line-height:1.7; }
.rank-list { display:flex; flex-direction:column; gap:16px; }
.rank-card {
  background:#fff; border-radius:var(--cp-radius); padding:24px;
  box-shadow:var(--cp-shadow); border:1px solid var(--cp-bg-soft);
  transition:0.2s;
}
.rank-card:hover { box-shadow:var(--cp-shadow-hover); }
.rank-card.top {
  border-color:var(--cp-accent); border-width:2px;
  background:linear-gradient(180deg,#fff 0%,#fef8f2 100%);
}
.rank-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.rank-name { font-size:18px; font-weight:700; color:var(--cp-text-dark);
  display:flex; align-items:center; gap:10px; }
.rank-badge {
  background:var(--cp-accent); color:#fff; padding:3px 10px;
  border-radius:10px; font-size:11px; font-weight:700;
}
.match-score {
  text-align:center; padding:8px 16px; background:var(--cp-primary);
  color:#fff; border-radius:8px;
}
.match-score .v { font-size:22px; font-weight:700; }
.match-score .l { font-size:11px; opacity:0.9; }
.breakdown { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin:14px 0; }
.bd-cell { text-align:center; padding:8px; background:var(--cp-bg-gray); border-radius:6px; }
.bd-cell .v { font-size:16px; font-weight:700; color:var(--cp-primary); }
.bd-cell .l { font-size:11px; color:var(--cp-text-light); margin-top:2px; }
.rank-meta { font-size:13px; color:var(--cp-text-body); margin-bottom:12px; }
.rank-actions { display:flex; gap:10px; margin-top:8px; }
</style>
</head>
<body>
<script src="data-model.js"></script>
<script src="ai-match.js"></script>
<script>CP.boot();</script>
<nav class="cp-navbar">
  <div class="cp-nav-inner">
    <a href="capability-platform.html" class="cp-nav-brand">思德库</a>
    <div class="cp-nav-links">
      <a href="institution-workspace.html">工作台</a>
      <button class="cp-nav-logout" onclick="CP.logout()">退出</button>
    </div>
  </div>
</nav>
<div class="page-wrap">
  <h1 class="page-title">AI 匹配结果</h1>
  <div id="content"></div>
</div>
<script src="match-result.js"></script>
</body>
</html>
