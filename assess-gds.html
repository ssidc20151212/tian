<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDS老年抑郁量表</title>
    <link rel="stylesheet" href="terminal-v2/style.css">
    <style>
        .block h2 { border-left-color: #5b2c6f; }
        .q-card { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 14px 0; border-left: 4px solid #5b2c6f; }
        .q-card h4 { font-size: 20px; color: #2c3e50; margin-bottom: 12px; }
        .q-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .q-opt { padding: 12px 18px; border-radius: 8px; border: 2px solid #ddd; background: white; font-size: 17px; cursor: pointer; }
        .q-opt:active { transform: scale(0.96); }
        .q-opt.selected { border-color: #5b2c6f; background: #f4ecf7; color: #5b2c6f; font-weight: bold; }
        .score-display { text-align: center; padding: 30px; margin: 20px 0; border-radius: 16px; background: #f8f9fa; display: none; }
        .score-display .total { font-size: 64px; font-weight: bold; }
        .score-display .level { font-size: 28px; margin-top: 10px; font-weight: bold; padding: 8px 30px; border-radius: 10px; display: inline-block; }
        .level-normal { background: #e8f8f0; color: #1e8449; }
        .level-mild { background: #fef9e7; color: #d68910; }
        .level-moderate { background: #fdecea; color: #c0392b; }
        .suggest-box { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 16px 0; display: none; }
        .nav-btns { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
        .nav-btns button { padding: 14px 40px; border-radius: 10px; font-size: 20px; cursor: pointer; border: none; }
        .nav-btns .btn-calc { background: #5b2c6f; color: white; }
        .nav-btns .btn-reset { background: #ecf0f1; color: #333; }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="page-header">
            <h1>GDS老年抑郁量表</h1>
            <p class="sub">GDS-15简版，快速筛查老年抑郁倾向</p>
        </div>
        <div class="notice">本工具用于抑郁情绪初步筛查，不作为精神科诊断依据。如有疑虑请转介专科。</div>
        <div class="block">
            <h2>请根据老人近一周的感受作答</h2>
            <div id="questions"></div>
        </div>
        <div class="nav-btns">
            <button class="btn-reset" onclick="resetAll()">重新评估</button>
            <button class="btn-calc" onclick="calcResult()">计算结果</button>
        </div>
        <div class="score-display" id="result">
            <div class="total" id="totalScore">0</div>
            <div>总分（满分15分，分数越高抑郁倾向越明显）</div>
            <div class="level" id="levelText"></div>
        </div>
        <div class="suggest-box" id="suggestBox"></div>
        <div class="page-footer">
            <a class="footer-btn" href="index.html">返回首页</a>
            <p class="disclaimer">思德库养老能力支持终端</p>
        </div>
    </div>
    <script>
    const items = [
        { title:'1. 您对自己的生活基本满意吗？', opts:[{text:'是（满意）',score:0},{text:'否（不满意）',score:1}] },
        { title:'2. 您是否放弃了许多活动和兴趣？', opts:[{text:'否（没放弃）',score:0},{text:'是（放弃了）',score:1}] },
        { title:'3. 您是否觉得生活空虚？', opts:[{text:'否',score:0},{text:'是',score:1}] },
        { title:'4. 您是否经常感到厌烦？', opts:[{text:'否',score:0},{text:'是',score:1}] },
        { title:'5. 您是否大部分时间精神都很好？', opts:[{text:'是（精神好）',score:0},{text:'否（精神不好）',score:1}] },
        { title:'6. 您是否害怕有什么不好的事发生？', opts:[{text:'否',score:0},{text:'是',score:1}] },
        { title:'7. 您是否大部分时间感到快乐？', opts:[{text:'是（快乐）',score:0},{text:'否（不快乐）',score:1}] },
        { title:'8. 您是否经常感到无助？', opts:[{text:'否',score:0},{text:'是',score:1}] },
        { title:'9. 您是否更喜欢待在家里而不愿出去？', opts:[{text:'否（愿意出去）',score:0},{text:'是（不愿出去）',score:1}] },
        { title:'10. 您是否觉得记忆力比别人差？', opts:[{text:'否',score:0},{text:'是',score:1}] },
        { title:'11. 您是否觉得现在活着很好？', opts:[{text:'是（觉得好）',score:0},{text:'否',score:1}] },
        { title:'12. 您是否觉得自己现在很没用？', opts:[{text:'否',score:0},{text:'是',score:1}] },
        { title:'13. 您是否觉得精力充沛？', opts:[{text:'是（充沛）',score:0},{text:'否（不充沛）',score:1}] },
        { title:'14. 您是否觉得自己的处境没有希望？', opts:[{text:'否',score:0},{text:'是',score:1}] },
        { title:'15. 您是否觉得大多数人比您幸福？', opts:[{text:'否',score:0},{text:'是',score:1}] }
    ];
    const answers = {};
    function renderQ() {
        const box = document.getElementById('questions');
        box.innerHTML = '';
        items.forEach((q, qi) => {
            let optsHtml = '';
            q.opts.forEach((opt, oi) => {
                const sel = answers[qi] === oi ? ' selected' : '';
                optsHtml += `<div class="q-opt${sel}" onclick="sel(${qi},${oi})">${opt.text}</div>`;
            });
            box.innerHTML += `<div class="q-card"><h4>${q.title}</h4><div class="q-options">${optsHtml}</div></div>`;
        });
    }
    function sel(qi, oi) { answers[qi] = oi; renderQ(); }
    function calcResult() {
        let total = 0;
        items.forEach((q, qi) => { if(answers[qi]!==undefined) total += q.opts[answers[qi]].score; });
        document.getElementById('totalScore').textContent = total;
        const el = document.getElementById('levelText');
        const sb = document.getElementById('suggestBox');
        if(total <= 4) { el.textContent='正常'; el.className='level level-normal'; sb.innerHTML='<h3 style="color:#1e8449;">情绪正常</h3><p>未发现明显抑郁倾向，建议每3个月常规筛查。</p>'; }
        else if(total <= 8) { el.textContent='轻度抑郁倾向'; el.className='level level-mild'; sb.innerHTML='<h3 style="color:#d68910;">轻度抑郁照护建议</h3><p>1. 增加社交活动和兴趣参与<br>2. 关注睡眠和食欲变化<br>3. 每日安排愉悦活动<br>4. 加强陪伴与倾听<br>5. 1个月后复评</p>'; }
        else { el.textContent='中重度抑郁倾向'; el.className='level level-moderate'; sb.innerHTML='<h3 style="color:#c0392b;">中重度抑郁照护建议</h3><p>1. 建议转介精神科/心理科评估<br>2. 密切关注安全（自伤风险）<br>3. 每日情绪观察记录<br>4. 保证基本生活规律<br>5. 告知家属<br>6. 2周后复评</p>'; }
        document.getElementById('result').style.display = 'block';
        sb.style.display = 'block';
    }
    function resetAll() { Object.keys(answers).forEach(k=>delete answers[k]); document.getElementById('result').style.display='none'; document.getElementById('suggestBox').style.display='none'; renderQ(); }
    renderQ();
    </script>
</body>
</html>
