<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认知症照护质量看板</title>
    <link rel="stylesheet" href="terminal-v2/style.css">
    <style>
        .block h2 { border-left-color: #1a5276; }
        .person-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 16px 0; }
        .person-tag { padding: 10px 18px; border-radius: 8px; border: 2px solid #ddd; background: white; font-size: 18px; cursor: pointer; }
        .person-tag.active { border-color: #1a5276; background: #d6eaf8; color: #1a5276; font-weight: bold; }
        .person-tag.add { border-style: dashed; color: #999; }
        .current-person { font-size: 22px; font-weight: bold; color: #1a5276; text-align: center; padding: 12px; background: #d6eaf8; border-radius: 10px; margin: 16px 0; }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 16px 0; }
        .kpi-card { background: #f8f9fa; border-radius: 12px; padding: 20px; text-align: center; }
        .kpi-card .value { font-size: 36px; font-weight: bold; color: #2c3e50; }
        .kpi-card .label { font-size: 16px; color: #7f8c8d; margin-top: 6px; }
        .kpi-card .trend { font-size: 14px; margin-top: 4px; }
        .trend-good { color: #27ae60; }
        .trend-bad { color: #e74c3c; }
        .form-row { display: flex; gap: 12px; margin: 10px 0; align-items: center; }
        .form-row label { font-size: 18px; min-width: 140px; color: #2c3e50; }
        .form-row input { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 18px; }
        .form-row input:focus { border-color: #1a5276; outline: none; }
        .nav-btns { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
        .nav-btns button { padding: 14px 40px; border-radius: 10px; font-size: 20px; cursor: pointer; border: none; }
        .nav-btns .btn-save { background: #1a5276; color: white; }
        .nav-btns .btn-reset { background: #ecf0f1; color: #333; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 16px; }
        .history-table th { background: #1a5276; color: white; padding: 10px; }
        .history-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .section-title { font-size: 20px; font-weight: bold; color: #1a5276; margin: 24px 0 10px; }
    </style>
</head>
<body>
<nav class="site-nav"><div class="site-nav-inner"><a href="index.html" class="site-nav-brand">思德库</a><ul class="site-nav-links"><li><a href="index.html#assess">专业评估</a></li><li><a href="index.html#dementia">认知症照护</a></li><li><a href="index.html#management">照护管理</a></li><li><a href="index.html#academy">网络学苑</a></li><li><a href="terminal-v2/06-pricing.html">价格</a></li><li><a href="terminal-v2/08-contact.html" class="nav-cta-btn">联系我们</a></li></ul></div></nav>
    <div class="page-wrap">
        <div class="page-header">
            <h1>认知症照护质量看板</h1>
            <p class="sub">核心KPI监控与质量追踪</p>
        </div>
        <div class="notice">定期录入数据，追踪照护质量趋势。</div>
        <div class="block">
            <h2>选择单元/楼层</h2>
            <div class="person-bar" id="personBar"></div>
        </div>
        <div class="current-person" id="currentPerson">请先选择或添加单元</div>
        <div id="mainContent" style="display:none;">
            <div class="block">
                <h2>本月数据录入</h2>
                <div class="form-row"><label>统计月份</label><input type="month" id="month"></div>
                <div class="form-row"><label>在院认知症人数</label><input type="number" id="total" placeholder="人"></div>
                <div class="section-title">安全指标</div>
                <div class="form-row"><label>跌倒事件数</label><input type="number" id="falls" placeholder="次"></div>
                <div class="form-row"><label>走失事件数</label><input type="number" id="wander" placeholder="次"></div>
                <div class="form-row"><label>误吸/噎食事件</label><input type="number" id="choke" placeholder="次"></div>
                <div class="form-row"><label>压疮新发数</label><input type="number" id="pressure" placeholder="例"></div>
                <div class="section-title">行为与功能</div>
                <div class="form-row"><label>BPSD发生人次</label><input type="number" id="bpsd" placeholder="人次"></div>
                <div class="form-row"><label>约束使用人数</label><input type="number" id="restraint" placeholder="人"></div>
                <div class="form-row"><label>体重下降>5%人数</label><input type="number" id="weight" placeholder="人"></div>
                <div class="section-title">服务与满意</div>
                <div class="form-row"><label>活动参与率(%)</label><input type="number" id="activity" placeholder="%"></div>
                <div class="form-row"><label>家属满意度(%)</label><input type="number" id="satisfy" placeholder="%"></div>
                <div class="form-row"><label>投诉数</label><input type="number" id="complaint" placeholder="次"></div>
            </div>
            <div class="nav-btns">
                <button class="btn-reset" onclick="clearForm()">清空</button>
                <button class="btn-save" onclick="saveData()">保存本月数据</button>
            </div>
            <div class="block">
                <h2>数据看板</h2>
                <div class="kpi-grid" id="kpiGrid"></div>
            </div>
            <div class="block">
                <h2>历史数据</h2>
                <table class="history-table" id="historyTable">
                    <thead><tr><th>月份</th><th>人数</th><th>跌倒</th><th>走失</th><th>BPSD</th><th>约束</th><th>满意度</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div class="page-footer">
            <a class="footer-btn" href="index.html">返回首页</a>
            <p class="disclaimer">本平台提供养老服务场景中的专业评估、观察与照护支持，不替代医学诊断、临床决策及依法应由持证专业人员完成的工作。最终判断应由相应专业人员结合实际情况确认。</p>
        </div>
    </div>
    <script>
    let persons = JSON.parse(localStorage.getItem('quality_units') || '[]');
    let currentId = '';

    function renderPersons() {
        const bar = document.getElementById('personBar');
        bar.innerHTML = '';
        persons.forEach(p => {
            const cls = currentId === p.id ? ' active' : '';
            bar.innerHTML += `<div class="person-tag${cls}" onclick="selectPerson('${p.id}')">${p.name}</div>`;
        });
        bar.innerHTML += `<div class="person-tag add" onclick="addPerson()">+ 添加单元</div>`;
    }
    function addPerson() {
        const name = prompt('请输入单元/楼层名称（如：认知症专区、3楼）：');
        if(!name || !name.trim()) return;
        const id = 'u_' + Date.now();
        persons.push({ id, name: name.trim() });
        localStorage.setItem('quality_units', JSON.stringify(persons));
        selectPerson(id);
    }
    function selectPerson(id) {
        currentId = id;
        const person = persons.find(p => p.id === id);
        document.getElementById('currentPerson').textContent = '当前单元：' + person.name;
        document.getElementById('mainContent').style.display = 'block';
        renderPersons();
        renderAll();
    }
    function getKey() { return 'quality_data_' + currentId; }
    function getRecords() { return JSON.parse(localStorage.getItem(getKey()) || '[]'); }

    function saveData() {
        if(!currentId) { alert('请先选择单元'); return; }
        const data = {
            month: document.getElementById('month').value,
            total: +document.getElementById('total').value || 0,
            falls: +document.getElementById('falls').value || 0,
            wander: +document.getElementById('wander').value || 0,
            choke: +document.getElementById('choke').value || 0,
            pressure: +document.getElementById('pressure').value || 0,
            bpsd: +document.getElementById('bpsd').value || 0,
            restraint: +document.getElementById('restraint').value || 0,
            weight: +document.getElementById('weight').value || 0,
            activity: +document.getElementById('activity').value || 0,
            satisfy: +document.getElementById('satisfy').value || 0,
            complaint: +document.getElementById('complaint').value || 0
        };
        if(!data.month) { alert('请选择月份'); return; }
        let records = getRecords();
        const idx = records.findIndex(r => r.month === data.month);
        if(idx >= 0) records[idx] = data;
        else records.push(data);
        records.sort((a, b) => b.month.localeCompare(a.month));
        localStorage.setItem(getKey(), JSON.stringify(records));
        clearForm();
        renderAll();
        alert('数据已保存');
    }
    function clearForm() {
        ['month','total','falls','wander','choke','pressure','bpsd','restraint','weight','activity','satisfy','complaint'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('month').value = new Date().toISOString().slice(0, 7);
    }
    function renderAll() { renderKPI(); renderHistory(); }
    function renderKPI() {
        const grid = document.getElementById('kpiGrid');
        const records = getRecords();
        if(records.length === 0) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#999;">暂无数据</p>'; return; }
        const cur = records[0];
        const prev = records[1];
        function trend(curVal, prevVal, lowerBetter) {
            if(!prev) return '';
            const diff = curVal - prevVal;
            if(diff === 0) return '<span style="color:#7f8c8d;">→ 持平</span>';
            const good = lowerBetter ? diff < 0 : diff > 0;
            const arrow = diff > 0 ? '↑' : '↓';
            return `<span class="${good?'trend-good':'trend-bad'}">${arrow} ${Math.abs(diff)}</span>`;
        }
        grid.innerHTML = `
            <div class="kpi-card"><div class="value">${cur.total}</div><div class="label">在院人数</div></div>
            <div class="kpi-card"><div class="value">${cur.falls}</div><div class="label">跌倒事件</div><div class="trend">${trend(cur.falls,prev?.falls,true)}</div></div>
            <div class="kpi-card"><div class="value">${cur.wander}</div><div class="label">走失事件</div><div class="trend">${trend(cur.wander,prev?.wander,true)}</div></div>
            <div class="kpi-card"><div class="value">${cur.bpsd}</div><div class="label">BPSD人次</div><div class="trend">${trend(cur.bpsd,prev?.bpsd,true)}</div></div>
            <div class="kpi-card"><div class="value">${cur.restraint}</div><div class="label">约束人数</div><div class="trend">${trend(cur.restraint,prev?.restraint,true)}</div></div>
            <div class="kpi-card"><div class="value">${cur.satisfy}%</div><div class="label">家属满意度</div><div class="trend">${trend(cur.satisfy,prev?.satisfy,false)}</div></div>`;
    }
    function renderHistory() {
        const records = getRecords();
        const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = '';
        if(records.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="color:#999;">暂无数据</td></tr>'; return; }
        records.forEach(r => {
            tbody.innerHTML += `<tr><td>${r.month}</td><td>${r.total}</td><td>${r.falls}</td><td>${r.wander}</td><td>${r.bpsd}</td><td>${r.restraint}</td><td>${r.satisfy}%</td></tr>`;
        });
    }
    document.getElementById('month').value = new Date().toISOString().slice(0, 7);
    renderPersons();
    </script>
</body>
</html>
