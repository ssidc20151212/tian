<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · CareProof AI · 思德库</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
body {
  min-height:100vh;
  background:linear-gradient(135deg,#0f2c47 0%,#1a5276 40%,#2980b9 75%,#FF8C42 100%);
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.login-wrap {
  background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.3);
  width:100%; max-width:440px; padding:44px 40px; position:relative;
}
.brand {
  font-family:'Noto Serif SC',serif; font-size:26px; font-weight:900;
  text-align:center; margin-bottom:6px;
  background:linear-gradient(135deg,var(--cp-primary),var(--cp-accent));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.subtitle { text-align:center; color:var(--cp-text-light); font-size:13px; margin-bottom:30px; }
.role-tabs { display:flex; gap:10px; margin-bottom:26px; }
.role-tab {
  flex:1; padding:12px 8px; border:1.5px solid var(--cp-border); border-radius:10px;
  background:var(--cp-bg-gray); color:var(--cp-text-body); font-size:14px; cursor:pointer;
  transition:0.2s; text-align:center; font-weight:600;
}
.role-tab:hover { border-color:var(--cp-primary-light); }
.role-tab.active {
  background:var(--cp-primary); color:#fff; border-color:var(--cp-primary);
  box-shadow:0 4px 12px rgba(26,82,118,0.3);
}
.field { margin-bottom:16px; }
.field label { display:block; font-size:13px; font-weight:600; color:var(--cp-text-dark); margin-bottom:6px; }
.field input {
  width:100%; padding:12px 16px; border:1.5px solid var(--cp-border); border-radius:8px;
  font-size:15px; outline:none; transition:border-color 0.2s;
}
.field input:focus { border-color:var(--cp-primary-light); }
.err { color:var(--cp-danger); font-size:13px; min-height:20px; margin-bottom:6px; }
.btn-login {
  width:100%; padding:14px; background:var(--cp-primary); color:#fff;
  border:none; border-radius:8px; font-size:16px; font-weight:600;
  cursor:pointer; transition:0.2s;
}
.btn-login:hover { background:var(--cp-primary-light); }
.hint {
  margin-top:20px; padding:14px; background:var(--cp-bg-gray); border-radius:8px;
  font-size:12px; color:var(--cp-text-light); line-height:1.8;
}
.hint strong { color:var(--cp-text-body); }
.back { position:absolute; top:20px; left:24px; font-size:13px; color:var(--cp-text-light); }
.back:hover { color:var(--cp-primary); }
.demo-note {
  margin-top:12px; padding:8px 12px; background:#fef3c7;
  border-radius:6px; font-size:11px; color:#92400e; line-height:1.5;
}
</style>
</head>
<body>
<div class="login-wrap">
  <a href="capability-platform.html" class="back">← 返回首页</a>
  <div class="brand">思德库</div>
  <p class="subtitle">CareProof AI · 角色登录</p>
  <div class="role-tabs">
    <div class="role-tab active" data-role="talent" onclick="selectRole('talent')">专业人才</div>
    <div class="role-tab" data-role="institution" onclick="selectRole('institution')">机构用户</div>
  </div>
  <div class="field">
    <label>账号</label>
    <input type="text" id="loginUser" placeholder="请输入账号" autocomplete="username">
  </div>
  <div class="field">
    <label>密码</label>
    <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">
  </div>
  <div class="err" id="err"></div>
  <button class="btn-login" onclick="doLogin()">登 录</button>
  <div class="hint">
    <strong>演示账号（DEMO ONLY）：</strong><br>
    专业人才：talent1 / 123456 &nbsp;或&nbsp; talent2 / 123456<br>
    机构用户：org1 / 123456<br>
    管理员：admin / 123456（隐藏入口）
  </div>
  <div class="demo-note">
    ⚠️ 本登录仅为演示用途，生产环境需接入真实身份认证。
  </div>
</div>
<script src="data-model.js"></script>
<script src="login.js"></script>
</body>
</html>
