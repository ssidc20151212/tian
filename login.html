<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 思德库养老专业能力平台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
        --primary:#1a5276; --primary-light:#2980b9;
        --accent:#FF8C42; --accent-light:#FFD166;
        --text-dark:#1a202c; --text-body:#4a5568; --text-light:#718096;
    }
    body {
        font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
        min-height:100vh;
        background:linear-gradient(135deg,#1a5276 0%,#2980b9 50%,#FF8C42 100%);
        display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .login-wrap {
        background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.3);
        width:100%; max-width:420px; padding:44px 40px; position:relative;
    }
    .brand {
        font-family:'Noto Serif SC',serif; font-size:24px; font-weight:900;
        text-align:center; margin-bottom:8px;
        background:linear-gradient(135deg,var(--primary),var(--accent));
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .subtitle { text-align:center; color:var(--text-light); font-size:14px; margin-bottom:32px; }
    .role-tabs { display:flex; gap:8px; margin-bottom:28px; }
    .role-tab {
        flex:1; padding:10px; border:1px solid #e2e8f0; border-radius:8px;
        background:#f7f8fa; color:var(--text-body); font-size:14px; cursor:pointer;
        transition:0.2s; text-align:center;
    }
    .role-tab.active {
        background:var(--primary); color:#fff; border-color:var(--primary);
    }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:13px; font-weight:600; color:var(--text-dark); margin-bottom:6px; }
    .field input {
        width:100%; padding:12px 16px; border:1px solid #e2e8f0; border-radius:8px;
        font-size:15px; outline:none; transition:border-color 0.2s;
    }
    .field input:focus { border-color:var(--primary-light); }
    .err { color:#e53e3e; font-size:13px; min-height:20px; margin-bottom:6px; }
    .btn-login {
        width:100%; padding:14px; background:var(--primary); color:#fff;
        border:none; border-radius:8px; font-size:16px; font-weight:600;
        cursor:pointer; transition:0.2s;
    }
    .btn-login:hover { background:var(--primary-light); }
    .hint {
        margin-top:20px; padding:14px; background:#f7f8fa; border-radius:8px;
        font-size:12px; color:var(--text-light); line-height:1.8;
    }
    .back { position:absolute; top:20px; left:24px; font-size:13px; color:var(--text-light); text-decoration:none; }
    .back:hover { color:var(--primary); }
</style>
</head>
<body>
<div class="login-wrap">
    <a href="capability-platform.html" class="back">← 返回首页</a>
    <div class="brand">思德库</div>
    <p class="subtitle">养老专业能力平台 · 角色登录</p>
    <div class="role-tabs">
        <div class="role-tab" data-role="assessor" onclick="selectRole('assessor')">评估师</div>
        <div class="role-tab" data-role="org" onclick="selectRole('org')">机构</div>
        <div class="role-tab" data-role="admin" onclick="selectRole('admin')">管理员</div>
    </div>
    <div class="field">
        <label>账号</label>
        <input type="text" id="loginUser" placeholder="请输入账号" autocomplete="username">
    </div>
    <div class="field">
        <label>密码</label>
        <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <div class="err" id="err"></div>
    <button class="btn-login" onclick="doLogin()">登 录</button>
    <div class="hint">
        <strong>测试账号：</strong><br>
        评估师：assessor / 123456<br>
        机构方：org / 123456<br>
        管理员：admin / 123456
    </div>
</div>
<script src="login.js"></script>
</body>
</html>
