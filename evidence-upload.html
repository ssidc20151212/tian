<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提交能力证据 · CareProof AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
.page-wrap { max-width:720px; margin:0 auto; padding:40px 24px; }
.page-title { font-family:'Noto Serif SC',serif; font-size:26px; color:var(--cp-text-dark);
  margin-bottom:8px; font-weight:700; }
.page-desc { font-size:14px; color:var(--cp-text-light); margin-bottom:32px; line-height:1.7; }
.form-card { background:#fff; border-radius:var(--cp-radius-lg); padding:32px;
  box-shadow:var(--cp-shadow); border:1px solid var(--cp-bg-soft); }
.submit-row { margin-top:24px; display:flex; gap:12px; justify-content:flex-end; }
.success-msg {
  display:none; padding:20px; background:#e8f8f0; border-radius:12px;
  color:#27ae60; text-align:center; margin-top:24px; font-weight:600;
}
</style>
</head>
<body>
<script src="data-model.js"></script>
<script>
CP.boot();
if (!CP.requireRole('talent')) {}
</script>
<nav class="cp-navbar">
  <div class="cp-nav-inner">
    <a href="capability-platform.html" class="cp-nav-brand">思德库</a>
    <div class="cp-nav-links">
      <a href="talent-workspace.html">工作台</a>
      <a href="evidence-upload.html" style="color:var(--cp-primary);font-weight:600;">提交证据</a>
      <button class="cp-nav-logout" onclick="CP.logout()">退出</button>
    </div>
  </div>
</nav>
<div class="page-wrap">
  <h1 class="page-title">提交能力证据</h1>
  <p class="page-desc">
    上传您的项目经历、评估报告、培训记录等证据材料。
    提交后思德库将进行核验，核验通过后计入您的能力档案评分。
  </p>
  <div class="form-card" id="formCard">
    <div class="cp-form-row">
      <div class="cp-form-group">
        <label class="cp-form-label">证据类型<span class="required">*</span></label>
        <select class="cp-form-select" id="evType"></select>
      </div>
      <div class="cp-form-group">
        <label class="cp-form-label">能力领域<span class="required">*</span></label>
        <select class="cp-form-select" id="evDomain"></select>
      </div>
    </div>
    <div class="cp-form-group">
      <label class="cp-form-label">证据标题<span class="required">*</span></label>
      <input class="cp-form-input" id="evTitle" placeholder="例：某某养老院评估体系建设项目">
    </div>
    <div class="cp-form-group">
      <label class="cp-form-label">证据摘要<span class="required">*</span></label>
      <textarea class="cp-form-textarea" id="evSummary" rows="4"
        placeholder="简要描述证据内容、成果和规模"></textarea>
    </div>
    <div class="cp-form-row">
      <div class="cp-form-group">
        <label class="cp-form-label">完成年份</label>
        <input class="cp-form-input" id="evYear" type="number" min="2000" max="2030"
          placeholder="2024">
      </div>
      <div class="cp-form-group">
        <label class="cp-form-label">证据等级（自评）</label>
        <select class="cp-form-select" id="evLevel">
          <option value="A">A - 核心证据</option>
          <option value="B">B - 补充证据</option>
          <option value="C">C - 参考材料</option>
        </select>
      </div>
    </div>
    <div class="cp-form-group">
      <label class="cp-form-label">附件说明</label>
      <input class="cp-form-input" id="evAttach" placeholder="如有附件请在此说明文件名（演示版暂不支持上传）">
      <div class="cp-form-hint">生产环境将支持 PDF/图片/视频附件上传</div>
    </div>
    <div class="submit-row">
      <a href="talent-workspace.html" class="cp-btn cp-btn-ghost">返回</a>
      <button class="cp-btn cp-btn-accent" onclick="submitEvidence()">提交证据</button>
    </div>
  </div>
  <div class="success-msg" id="successMsg">
    证据提交成功！状态为"材料已提交"，等待思德库核验。
    <br><a href="talent-workspace.html" style="color:var(--cp-primary);margin-top:12px;display:inline-block;">返回工作台</a>
  </div>
</div>
<script src="evidence-upload.js"></script>
</body>
</html>
