<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常能力追踪</title>
    <link rel="stylesheet" href="terminal-v2/style.css">
    <style>
        .block h2 { border-left-color: #2980b9; }
        .person-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 16px 0; }
        .person-tag { padding: 10px 18px; border-radius: 8px; border: 2px solid #ddd; background: white; font-size: 18px; cursor: pointer; }
        .person-tag.active { border-color: #2980b9; background: #e8f4fd; color: #2471a3; font-weight: bold; }
        .person-tag.add { border-style: dashed; color: #999; }
        .current-person { font-size: 22px; font-weight: bold; color: #2980b9; text-align: center; padding: 12px; background: #e8f4fd; border-radius: 10px; margin: 16px 0; }
        .q-card { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 14px 0; border-left: 4px solid #2980b9; }
        .q-card h4 { font-size: 20px; color: #2c3e50; margin-bottom: 12px; }
        .q-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .q-opt { padding: 12px 18px; border-radius: 8px; border: 2px solid #ddd; background: white; font-size: 17px; cursor: pointer; }
        .q-opt:active { transform: scale(0.96); }
        .q-opt.selected { border-color: #2980b9; background: #e8f4fd; color: #2471a3; font-weight: bold; }
        .score-display { text-align: center; padding: 30px; margin: 20px 0; border-radius: 16px; background: #f8f9fa; display: none; }
        .score-display .total { font-size: 48px; font-weight: bold; }
        .score-display .level { font-size: 28px; margin-top: 10px; font-weight: bold; padding: 8px 30px; border-radius: 10px; display: inline-block; }
        .level-ind { background: #e8f8f0; color: #1e8449; }
        .level-mild { background: #e8f4fd; color: #2471a3; }
        .level-mod { background: #fef9e7; color: #d68910; }
        .level-sev { background: #fdecea; color: #c0392b; }
        .suggest-box { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 16px 0; display: none; }
        .nav-btns { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
        .nav-btns button { padding: 14px 40px; border-radius: 10px; font-size: 20px; cursor: pointer; border: none; }
        .nav-btns .btn-calc { background: #2980b9; color: white; }
        .nav-btns .btn-reset { background: #ecf0f1; color: #333; }
        .section-title { font-size: 22px; color: #2980b9; font-weight: bold; margin: 24px 0 8px; padding: 10px 16px; background: #e8f4fd; border-radius: 8px; }
        .history-entry { background: #f8f9fa; border-radius: 8px; padding: 12px 16px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #2980b9; }
        .history-entry .date { color: #7f8c8d; font-size: 15px; }
        .history-entry .result { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
<nav class="site-nav"><div class="site-nav-inner"><a href="index.html" class="site-nav-brand">思德库</a><ul class="site-nav-links"><li><a href="index.html#assess">专业评估</a></li><li><a href="index.html#dementia">认知症照护</a></li><li><a href="index.html#management">照护管理</a></li><li><a href="index.html#academy">网络学苑</a></li><li><a href="terminal-v2/06-pricing.html">价格</a></li><li><a href="terminal-v2/08-contact.html" class="nav-cta-btn">联系我们</a></li></ul></div></nav>
    <div class="page-wrap">
        <div class="page-header">
            <h1>日常能力追踪</h1>
            <p class="sub">老人现在能自己做哪些事？需要多少帮助？</p>
        </div>
        <div class="notice">定期评估，观察能力变化趋势。建议每月评估一次，及时调整照护方案。</div>
        <div class="block">
            <h2>选择老人</h2>
            <div class="person-bar" id="personBar"></div>
        </div>
        <div class="current-person" id="currentPerson">请先选择或添加老人</div>
        <div id="mainContent" style="display:none;">
            <div class="block">
                <h2>逐项评估</h2>
                <div class="section-title">基本生活能力</div>
                <div id="questions"></div>
            </div>
            <div class="nav-btns">
                <button class="btn-reset" onclick="resetAll()">重新评估</button>
                <button class="btn-calc" onclick="calcResult()">计算并保存结果</button>
            </div>
            <div class="score-display" id="result">
                <div class="total" id="totalScore">0</div>
                <div>总分（满分84分，分数越高越独立）</div>
                <div class="level" id="levelText"></div>
            </div>
            <div class="suggest-box" id="suggestBox"></div>
            <div class="block">
                <h2>历史评估记录</h2>
                <div id="historyList"><p style="color:#999;text-align:center;">暂无历史记录</p></div>
            </div>
        </div>
        <div class="page-footer">
            <a class="footer-btn" href="index.html">返回首页</a>
            <p class="disclaimer">本平台提供养老服务场景中的专业评估、观察与照护支持，不替代医学诊断、临床决策及依法应由持证专业人员完成的工作。最终判断应由相应专业人员结合实际情况确认。</p>
        </div>
    </div>
    <script>
    const items = [
        { title:'1. 吃饭', opts:[{text:'自己吃（10分）',score:10},{text:'需要帮一点（5分）',score:5},{text:'完全要人喂（0分）',score:0}] },
        { title:'2. 洗澡', opts:[{text:'自己洗（5分）',score:5},{text:'需要人帮（0分）',score:0}] },
        { title:'3. 洗脸刷牙梳头', opts:[{text:'自己来（5分）',score:5},{text:'需要人帮（0分）',score:0}] },
        { title:'4. 穿衣服', opts:[{text:'自己穿（10分）',score:10},{text:'需要帮一点（5分）',score:5},{text:'完全要人帮（0分）',score:0}] },
        { title:'5. 大便能控制吗', opts:[{text:'能控制（10分）',score:10},{text:'偶尔控制不住（5分）',score:5},{text:'控制不了（0分）',score:0}] },
        { title:'6. 小便能控制吗', opts:[{text:'能控制（10分）',score:10},{text:'偶尔控制不住（5分）',score:5},{text:'控制不了（0分）',score:0}] },
        { title:'7. 上厕所', opts:[{text:'自己去（10分）',score:10},{text:'需要帮一点（5分）',score:5},{text:'完全要人帮（0分）',score:0}] },
        { title:'8. 从床上到椅子（转移）', opts:[{text:'自己来（15分）',score:15},{text:'需要搭把手（10分）',score:10},{text:'需要很多帮助（5分）',score:5},{text:'完全不能（0分）',score:0}] },
        { title:'9. 走路', opts:[{text:'自己走（15分）',score:15},{text:'需要人扶（10分）',score:10},{text:'用轮椅能自己推（5分）',score:5},{text:'不能走（0分）',score:0}] },
        { title:'10. 上下楼梯', opts:[{text:'自己上下（10分）',score:10},{text:'需要人扶（5分）',score:5},{text:'不能（0分）',score:0}] },
        { title:'11. 打电话', opts:[{text:'自己打（3分）',score:3},{text:'需要帮忙（2分）',score:2},{text:'不能（0分）',score:0}] },
        { title:'12. 买东西', opts:[{text:'自己买（3分）',score:3},{text:'需要人陪（2分）',score:2},{text:'不能（0分）',score:0}] },
        { title:'13. 做饭', opts:[{text:'自己做（3分）',score:3},{text:'需要帮忙（2分）',score:2},{text:'不能（0分）',score:0}] },
        { title:'14. 做家务', opts:[{text:'自己做（3分）',score:3},{text:'需要帮忙（2分）',score:2},{text:'不能（0分）',score:0}] },
        { title:'15. 洗衣服', opts:[{text:'自己洗（3分）',score:3},{text:'需要帮忙（2分）',score:2},{text:'不能（0分）',score:0}] },
        { title:'16. 出门坐车', opts:[{text:'自己去（3分）',score:3},{text:'需要人陪（2分）',score:2},{text:'不能（0分）',score:0}] },
        { title:'17. 管理自己的药', opts:[{text:'自己管（3分）',score:3},{text:'需要提醒（2分）',score:2},{text:'不能（0分）',score:0}] },
        { title:'18. 管钱', opts:[{text:'自己管（3分）',score:3},{text:'需要帮忙（2分）',score:2},{text:'不能（0分）',score:0}] }
    ];
    const answers = {};
    let persons = JSON.parse(localStorage.getItem('bpsd_persons') || '[]');
    let currentId = '';

    function renderPersons() {
        const bar = document.getElementById('personBar');
        bar.innerHTML = '';
        persons.forEach(p => {
            const cls = currentId === p.id ? ' active' : '';
            bar.innerHTML += `<div class="person-tag${cls}" onclick="selectPerson('${p.id}')">${p.name}</div>`;
        });
        bar.innerHTML += `<div class="person-tag add" onclick="addPerson()">+ 添加老人</div>`;
    }
    function addPerson() {
        const name = prompt('请输入老人姓名：');
        if(!name || !name.trim()) return;
        const id = 'p_' + Date.now();
        persons.push({ id, name: name.trim() });
        localStorage.setItem('bpsd_persons', JSON.stringify(persons));
        selectPerson(id);
    }
    function selectPerson(id) {
        currentId = id;
        const person = persons.find(p => p.id === id);
        document.getElementById('currentPerson').textContent = '当前评估：' + person.name;
        document.getElementById('mainContent').style.display = 'block';
        resetAll();
        renderPersons();
        renderHistory();
    }

    function renderQ() {
        const box = document.getElementById('questions');
        box.innerHTML = '';
        items.forEach((q, qi) => {
            if(qi === 10) box.innerHTML += '<div class="section-title" style="margin-top:30px;">生活管理能力</div>';
            let optsHtml = '';
            q.opts.forEach((opt, oi) => {
                const sel = answers[qi] === oi ? ' selected' : '';
                optsHtml += `<div class="q-opt${sel}" onclick="sel(${qi},${oi})">${opt.text}</div>`;
            });
            box.innerHTML += `<div class="q-card"><h4>${q.title}</h4><div class="q-options">${optsHtml}</div></div>`;
        });
    }
    function sel(qi, oi) { answers[qi] = oi; renderQ(); }

    function calcResult() {
        if(!currentId) { alert('请先选择老人'); return; }
        let total = 0;
        items.forEach((q, qi) => { if(answers[qi]!==undefined) total += q.opts[answers[qi]].score; });
        document.getElementById('totalScore').textContent = total + '/84';
        const el = document.getElementById('levelText');
        const sb = document.getElementById('suggestBox');
        let levelName = '';
        if(total >= 70) { levelName='基本独立'; el.textContent='基本独立'; el.className='level level-ind'; sb.innerHTML='<h3 style="color:#1e8449;">基本独立</h3><p>日常生活能力良好，鼓励保持自主活动，定期复评。</p>'; }
        else if(total >= 45) { levelName='轻度依赖'; el.textContent='轻度依赖'; el.className='level level-mild'; sb.innerHTML='<h3 style="color:#2471a3;">轻度依赖照护建议</h3><p>1. 鼓励自主完成能做的事<br>2. 部分项目提供辅助<br>3. 关注能力下降趋势<br>4. 适当辅具配置<br>5. 每月复评</p>'; }
        else if(total >= 20) { levelName='中度依赖'; el.textContent='中度依赖'; el.className='level level-mod'; sb.innerHTML='<h3 style="color:#d68910;">中度依赖照护建议</h3><p>1. 制定个性化照护计划<br>2. 协助完成大部分活动<br>3. 康复训练维持现有功能<br>4. 跌倒预防<br>5. 家属沟通照护方案<br>6. 每2周复评</p>'; }
        else { levelName='重度依赖'; el.textContent='重度依赖'; el.className='level level-sev'; sb.innerHTML='<h3 style="color:#c0392b;">重度依赖照护建议</h3><p>1. 全面生活照料<br>2. 被动活动防止关节挛缩<br>3. 皮肤护理和压疮预防<br>4. 营养支持<br>5. 舒适照护<br>6. 每周复评</p>'; }
        document.getElementById('result').style.display = 'block';
        sb.style.display = 'block';
        const key = 'adl_history_' + currentId;
        const history = JSON.parse(localStorage.getItem(key) || '[]');
        history.unshift({ date: new Date().toISOString().slice(0,10), score: total, level: levelName });
        localStorage.setItem(key, JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const key = 'adl_history_' + currentId;
        const history = JSON.parse(localStorage.getItem(key) || '[]');
        const box = document.getElementById('historyList');
        if(history.length === 0) { box.innerHTML = '<p style="color:#999;text-align:center;">暂无历史记录</p>'; return; }
        box.innerHTML = '';
        history.forEach(h => {
            box.innerHTML += `<div class="history-entry"><span class="date">${h.date}</span><span class="result">${h.score}/84分 - ${h.level}</span></div>`;
        });
    }

    function resetAll() {
        Object.keys(answers).forEach(k => delete answers[k]);
        document.getElementById('result').style.display = 'none';
        document.getElementById('suggestBox').style.display = 'none';
        renderQ();
    }
    renderPersons();
    renderQ();
    </script>
</body>
</html>
