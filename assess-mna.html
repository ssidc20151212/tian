<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNA营养风险筛查</title>
    <link rel="stylesheet" href="terminal-v2/style.css">
    <style>
        .block h2 { border-left-color: #f39c12; }
        .q-card { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 14px 0; border-left: 4px solid #f39c12; }
        .q-card h4 { font-size: 20px; color: #2c3e50; margin-bottom: 12px; }
        .q-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .q-opt { padding: 12px 18px; border-radius: 8px; border: 2px solid #ddd; background: white; font-size: 17px; cursor: pointer; }
        .q-opt:active { transform: scale(0.96); }
        .q-opt.selected { border-color: #f39c12; background: #fef9e7; color: #d68910; font-weight: bold; }
        .score-display { text-align: center; padding: 30px; margin: 20px 0; border-radius: 16px; background: #f8f9fa; display: none; }
        .score-display .total { font-size: 64px; font-weight: bold; }
        .score-display .level { font-size: 28px; margin-top: 10px; font-weight: bold; padding: 8px 30px; border-radius: 10px; display: inline-block; }
        .level-good { background: #e8f8f0; color: #1e8449; }
        .level-risk { background: #fef9e7; color: #d68910; }
        .level-bad { background: #fdecea; color: #c0392b; }
        .suggest-box { background: #f8f9fa; border-radius: 10px; padding: 20px; margin: 16px 0; display: none; }
        .nav-btns { display: flex; gap: 16px; justify-content: center; margin: 20px 0; }
        .nav-btns button { padding: 14px 40px; border-radius: 10px; font-size: 20px; cursor: pointer; border: none; }
        .nav-btns .btn-calc { background: #f39c12; color: white; }
        .nav-btns .btn-reset { background: #ecf0f1; color: #333; }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="page-header">
            <h1>MNA营养风险筛查</h1>
            <p class="sub">快速识别营养不良风险，及时干预</p>
        </div>
        <div class="notice">MNA-SF简易营养评估量表，满分14分，分数越低营养风险越高。</div>
        <div class="block">
            <h2>逐项评估</h2>
            <div id="questions"></div>
        </div>
        <div class="nav-btns">
            <button class="btn-reset" onclick="resetAll()">重新评估</button>
            <button class="btn-calc" onclick="calcResult()">计算结果</button>
        </div>
        <div class="score-display" id="result">
            <div class="total" id="totalScore">0</div>
            <div>总分（满分14分）</div>
            <div class="level" id="levelText"></div>
        </div>
        <div class="suggest-box" id="suggestBox"></div>
        <div class="page-footer">
            <a class="footer-btn" href="index.html">返回首页</a>
            <p class="disclaimer">思德库养老能力支持终端</p>
        </div>
    </div>
    <script>
        const items = [
            { title:'1. 近3个月内食欲是否下降', opts:[{text:'严重下降（0分）',score:0},{text:'中度下降（1分）',score:1},{text:'无下降（2分）',score:2}] },
            { title:'2. 近3个月内体重是否下降', opts:[{text:'下降超过3公斤（0分）',score:0},{text:'不知道（1分）',score:1},{text:'下降1—3公斤（2分）',score:2},{text:'无下降（3分）',score:3}] },
            { title:'3. 活动能力', opts:[{text:'卧床/轮椅（0分）',score:0},{text:'可下床但不出门（1分）',score:1},{text:'可自由外出（2分）',score:2}] },
            { title:'4. 近3个月内是否有心理应激或急性疾病', opts:[{text:'有（0分）',score:0},{text:'无（2分）',score:2}] },
            { title:'5. 精神心理问题', opts:[{text:'严重认知症或抑郁（0分）',score:0},{text:'轻度认知症（1分）',score:1},{text:'无精神心理问题（2分）',score:2}] },
            { title:'6. BMI体质指数（或小腿围）', opts:[{text:'BMI<19（0分）',score:0},{text:'BMI 19—21（1分）',score:1},{text:'BMI 21—23（2分）',score:2},{text:'BMI≥23（3分）',score:3}] }
        ];
        const answers = {};
        function renderQ() {
            const box = document.getElementById('questions');
            box.innerHTML = '';
            items.forEach((q, qi) => {
                let optsHtml = '';
                q.opts.forEach((opt, oi) => {
                    const sel = answers[qi] === oi ? ' selected' : '';
                    optsHtml += `<div class="q-opt${sel}" onclick="sel(${qi},${oi})">${opt.text}</div>`;
                });
                box.innerHTML += `<div class="q-card"><h4>${q.title}</h4><div class="q-options">${optsHtml}</div></div>`;
            });
        }
        function sel(qi, oi) { answers[qi] = oi; renderQ(); }
        function calcResult() {
            let total = 0;
            items.forEach((q, qi) => { if(answers[qi]!==undefined) total += q.opts[answers[qi]].score; });
            document.getElementById('totalScore').textContent = total;
            const el = document.getElementById('levelText');
            const sb = document.getElementById('suggestBox');
            if(total >= 12) { el.textContent='营养状况正常'; el.className='level level-good'; sb.innerHTML='<h3 style="color:#1e8449;">营养正常</h3><p>继续保持均衡饮食，3个月后常规复评。</p>'; }
            else if(total >= 8) { el.textContent='有营养不良风险'; el.className='level level-risk'; sb.innerHTML='<h3 style="color:#d68910;">营养风险照护建议</h3><p>1. 增加蛋白质和热量摄入<br>2. 少量多餐（每日5—6餐）<br>3. 每周监测体重<br>4. 必要时营养补充剂<br>5. 30天后复评</p>'; }
            else { el.textContent='营养不良'; el.className='level level-bad'; sb.innerHTML='<h3 style="color:#c0392b;">营养不良照护建议</h3><p>1. 立即转介营养师/医生评估<br>2. 营养补充剂介入<br>3. 排查进食困难原因（口腔、吞咽、情绪）<br>4. 每日监测进食量<br>5. 每周称体重<br>6. 14天后复评</p>'; }
            document.getElementById('result').style.display = 'block';
            sb.style.display = 'block';
        }
        function resetAll() { Object.keys(answers).forEach(k=>delete answers[k]); document.getElementById('result').style.display='none'; document.getElementById('suggestBox').style.display='none'; renderQ(); }
        renderQ();
    </script>
</body>
</html>
