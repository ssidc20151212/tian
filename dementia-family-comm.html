<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家属沟通工具</title>
    <link rel="stylesheet" href="terminal-v2/style.css">
    <style>
        .block h2 { border-left-color: #8e44ad; }
        .person-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 16px 0; }
        .person-tag { padding: 10px 18px; border-radius: 8px; border: 2px solid #ddd; background: white; font-size: 18px; cursor: pointer; }
        .person-tag.active { border-color: #8e44ad; background: #f4ecf7; color: #8e44ad; font-weight: bold; }
        .person-tag.add { border-style: dashed; color: #999; }
        .current-person { font-size: 22px; font-weight: bold; color: #8e44ad; text-align: center; padding: 12px; background: #f4ecf7; border-radius: 10px; margin: 16px 0; }
        .template-card { background: #f8f9fa; border-radius: 12px; padding: 20px; margin: 14px 0; border-left: 4px solid #8e44ad; }
        .template-card h3 { font-size: 22px; color: #2c3e50; margin-bottom: 10px; }
        .template-card .scene { color: #7f8c8d; font-size: 16px; margin-bottom: 12px; }
        .template-content { background: white; border-radius: 8px; padding: 16px; border: 1px solid #eee; font-size: 17px; line-height: 1.8; white-space: pre-line; }
        .copy-btn { display: inline-block; margin-top: 12px; padding: 8px 20px; background: #8e44ad; color: white; border-radius: 8px; font-size: 16px; cursor: pointer; border: none; }
        .record-btn { display: inline-block; margin-top: 12px; margin-left: 10px; padding: 8px 20px; background: #27ae60; color: white; border-radius: 8px; font-size: 16px; cursor: pointer; border: none; }
        .tip-box { background: #e8f8f0; border-radius: 10px; padding: 16px; margin: 14px 0; font-size: 17px; line-height: 1.8; }
        .tip-box h4 { color: #1e8449; margin-bottom: 8px; }
        .history-entry { background: #f8f9fa; border-radius: 8px; padding: 12px 16px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #8e44ad; }
        .history-entry .date { color: #7f8c8d; font-size: 15px; }
        .history-entry .result { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="page-header">
            <h1>家属沟通工具</h1>
            <p class="sub">认知症照护中的家属沟通模板与技巧</p>
        </div>
        <div class="notice">良好的家属沟通是照护质量的重要保障。选择老人后，模板会自动填入姓名。</div>
        <div class="block">
            <h2>选择老人</h2>
            <div class="person-bar" id="personBar"></div>
        </div>
        <div class="current-person" id="currentPerson">请先选择或添加老人</div>
        <div id="mainContent" style="display:none;">
            <div class="block">
                <h2>沟通技巧要点</h2>
                <div class="tip-box">
                    <h4>与家属沟通的基本原则</h4>
                    <p>1. 先共情再说事：理解家属的焦虑和愧疚<br>
                    2. 用事实说话：有记录、有数据、有观察<br>
                    3. 给选择不给命令<br>
                    4. 定期主动沟通，不只在出事时才联系<br>
                    5. 避免专业术语，用通俗语言<br>
                    6. 团队信息口径统一</p>
                </div>
            </div>
            <div class="block">
                <h2>场景化沟通模板</h2>
                <div id="templates"></div>
            </div>
            <div class="block">
                <h2>沟通记录</h2>
                <div id="historyList"><p style="color:#999;text-align:center;">暂无记录</p></div>
            </div>
        </div>
        <div class="page-footer">
            <a class="footer-btn" href="index.html">返回首页</a>
            <p class="disclaimer">思德库养老能力支持终端</p>
        </div>
    </div>
    <script>
    const templates = [
        { title:'入住初期告知', scene:'新入住，向家属说明照护安排', content:'家属您好：\n\n{name}已顺利入住。目前适应情况如下：\n· 饮食：____\n· 睡眠：____\n· 情绪：____\n· 与其他老人互动：____\n\n初步照护方案：\n1. ____\n2. ____\n\n适应期可能出现的正常反应：____\n我们会密切观察并及时沟通。' },
        { title:'病情变化通知', scene:'认知功能下降或出现新症状', content:'家属您好：\n\n关于{name}近期情况：\n\n观察到以下变化：\n· ____（具体表现）\n· 发生频率：____\n· 从____时间开始出现\n\n已采取措施：\n1. ____\n2. ____\n\n建议下一步：\n□ 转介医疗评估\n□ 调整照护方案\n□ 增加____服务' },
        { title:'行为问题告知', scene:'出现攻击、游走等行为问题', content:'家属您好：\n\n向您沟通{name}近期行为情况：\n\n· 时间：____\n· 表现：____\n· 可能诱因：____\n· 处理方式：____\n· 目前状态：已恢复平稳/仍需观察\n\n这类行为是认知症的常见表现，并非故意为之。\n\n如有好的安抚方式（喜欢的歌、物品），请告诉我们。' },
        { title:'照护方案调整', scene:'评估后需调整照护等级', content:'家属您好：\n\n基于最新评估，{name}目前情况：\n· 能力等级：____\n· 主要变化：____\n\n建议调整为：\n原方案：____\n新方案：____\n\n调整原因：____\n费用变化：____\n\n请确认是否同意。' },
        { title:'意外事件通报', scene:'发生跌倒等安全事件', content:'家属您好：\n\n紧急通报：{name}于____时间发生____。\n\n经过：____\n当前状况：____\n已采取措施：____\n\n□ 情况稳定，继续观察\n□ 已送医检查\n□ 建议来院探视\n\n预防措施已加强：____' },
        { title:'月度沟通', scene:'每月例行情况汇报', content:'家属您好：\n\n{name}____月情况汇报：\n\n身体：体重____kg，饮食____，睡眠____\n认知：____，情绪：____\n行为：____\n活动参与：____\n\n本月特别事项：____\n下月重点：____\n\n感谢您的信任与支持。' }
    ];
    let persons = JSON.parse(localStorage.getItem('bpsd_persons') || '[]');
    let currentId = '';

    function renderPersons() {
        const bar = document.getElementById('personBar');
        bar.innerHTML = '';
        persons.forEach(p => {
            const cls = currentId === p.id ? ' active' : '';
            bar.innerHTML += `<div class="person-tag${cls}" onclick="selectPerson('${p.id}')">${p.name}</div>`;
        });
        bar.innerHTML += `<div class="person-tag add" onclick="addPerson()">+ 添加老人</div>`;
    }
    function addPerson() {
        const name = prompt('请输入老人姓名：');
        if(!name || !name.trim()) return;
        const id = 'p_' + Date.now();
        persons.push({ id, name: name.trim() });
        localStorage.setItem('bpsd_persons', JSON.stringify(persons));
        selectPerson(id);
    }
    function selectPerson(id) {
        currentId = id;
        const person = persons.find(p => p.id === id);
        document.getElementById('currentPerson').textContent = '当前沟通：' + person.name;
        document.getElementById('mainContent').style.display = 'block';
        renderPersons();
        renderTemplates();
        renderHistory();
    }
    function getKey() { return 'comm_log_' + currentId; }
    function getRecords() { return JSON.parse(localStorage.getItem(getKey()) || '[]'); }
    function getPersonName() {
        const person = persons.find(p => p.id === currentId);
        return person ? person.name : '';
    }
    function renderTemplates() {
        const box = document.getElementById('templates');
        const name = getPersonName();
        box.innerHTML = '';
        templates.forEach((t, i) => {
            const filled = t.content.replace(/\{name\}/g, name);
            box.innerHTML += `<div class="template-card"><h3>${t.title}</h3><div class="scene">场景：${t.scene}</div><div class="template-content">${filled}</div><button class="copy-btn" onclick="copyTemplate(${i})">复制模板</button><button class="record-btn" onclick="recordComm(${i})">记录本次沟通</button></div>`;
        });
    }
    function copyTemplate(i) {
        const name = getPersonName();
        const text = templates[i].content.replace(/\{name\}/g, name);
        navigator.clipboard.writeText(text).then(() => alert('已复制')).catch(() => alert('复制失败，请手动选择'));
    }
    function recordComm(i) {
        const records = getRecords();
        records.unshift({ date: new Date().toISOString().slice(0,10), type: templates[i].title });
        localStorage.setItem(getKey(), JSON.stringify(records));
        renderHistory();
        alert('已记录');
    }
    function renderHistory() {
        const records = getRecords();
        const box = document.getElementById('historyList');
        if(records.length === 0) { box.innerHTML = '<p style="color:#999;text-align:center;">暂无记录</p>'; return; }
        box.innerHTML = '';
        records.forEach(r => {
            box.innerHTML += `<div class="history-entry"><span class="date">${r.date}</span><span class="result">${r.type}</span></div>`;
        });
    }
    renderPersons();
    </script>
</body>
</html>
