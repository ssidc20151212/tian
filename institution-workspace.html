<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机构工作台 · CareProof AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
.workspace { max-width:1000px; margin:0 auto; padding:32px 24px; }
.ws-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:36px; padding-bottom:20px; border-bottom:1px solid var(--cp-bg-soft);
}
.ws-header h1 { font-family:'Noto Serif SC',serif; font-size:24px; color:var(--cp-text-dark); }
.ws-header .role-badge { font-size:12px; padding:4px 12px; background:var(--cp-primary);
  color:#fff; border-radius:12px; font-weight:600; }
.ws-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; margin-bottom:40px; }
.ws-card { padding:28px 24px; }
.ws-card h3 { font-size:17px; color:var(--cp-text-dark); margin-bottom:8px; font-weight:700; }
.ws-card p { font-size:13px; color:var(--cp-text-light); margin-bottom:16px; line-height:1.7; }
.section-title { font-family:'Noto Serif SC',serif; font-size:20px;
  color:var(--cp-text-dark); margin-bottom:20px; font-weight:700; }
.need-list { list-style:none; }
.need-item {
  background:#fff; border-radius:12px; padding:20px; margin-bottom:14px;
  box-shadow:var(--cp-shadow); border:1px solid var(--cp-bg-soft);
}
.need-item h4 { font-size:15px; color:var(--cp-text-dark); margin-bottom:6px; }
.need-item .meta { font-size:12px; color:var(--cp-text-light); margin-bottom:8px; }
.need-item .desc { font-size:13px; color:var(--cp-text-body); line-height:1.6; }
.match-tag { display:inline-block; padding:2px 8px; border-radius:8px; font-size:11px;
  font-weight:600; background:#e8f8f0; color:#27ae60; margin-left:8px; }
</style>
</head>
<body>
<script src="data-model.js"></script>
<script>
CP.boot();
if (!CP.requireRole('institution')) { /* redirected */ }
</script>
<!-- 导航 -->
<nav class="cp-navbar">
  <div class="cp-nav-inner">
    <a href="capability-platform.html" class="cp-nav-brand">思德库</a>
    <div class="cp-nav-links" id="navLinks">
      <a href="institution-workspace.html">工作台</a>
      <a href="institution-need.html">提交需求</a>
      <a href="find-talent.html">浏览档案</a>
      <span class="cp-nav-user" id="navUser"></span>
      <button class="cp-nav-logout" onclick="CP.logout()">退出</button>
    </div>
  </div>
</nav>
<div class="workspace">
  <div class="ws-header">
    <h1 id="wsTitle">机构工作台</h1>
    <span class="role-badge">机构用户</span>
  </div>
  <div class="ws-cards">
    <div class="cp-card ws-card">
      <h3>提交专业问题</h3>
      <p>描述您的评估、培训、质控问题，AI 将精准匹配专业力量</p>
      <a href="institution-need.html" class="cp-btn cp-btn-primary cp-btn-sm">提交需求</a>
    </div>
    <div class="cp-card ws-card">
      <h3>我的需求列表</h3>
      <p>查看已提交的需求及匹配进度</p>
      <a href="#needs" class="cp-btn cp-btn-outline cp-btn-sm" onclick="showNeeds()">查看需求</a>
    </div>
    <div class="cp-card ws-card">
      <h3>浏览能力档案</h3>
      <p>查看平台上经过验证的专业人才能力档案</p>
      <a href="find-talent.html" class="cp-btn cp-btn-ghost cp-btn-sm">浏览</a>
    </div>
  </div>
  <section id="sec-needs" style="display:none;">
    <h2 class="section-title">我提交的需求</h2>
    <ul class="need-list" id="needList"></ul>
  </section>
</div>
<script src="institution-workspace.js"></script>
</body>
</html>
