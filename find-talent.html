<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>能力档案浏览 · CareProof AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
.hero-ft {
  background:linear-gradient(135deg,#1a5276 0%,#2980b9 40%,#FF8C42 100%);
  padding:48px 24px; text-align:center; color:#fff;
}
.hero-ft h1 { font-family:'Noto Serif SC',serif; font-size:30px; font-weight:900; margin-bottom:8px; }
.hero-ft p { font-size:15px; opacity:0.9; max-width:640px; margin:0 auto; }
.filter-section { padding:28px 24px; background:var(--cp-bg-gray); }
.filter-bar {
  max-width:1200px; margin:0 auto;
  display:flex; gap:12px; flex-wrap:wrap; align-items:center;
  background:#fff; padding:16px; border-radius:12px; box-shadow:var(--cp-shadow);
}
.filter-bar select, .filter-bar input {
  padding:10px 14px; border:1px solid var(--cp-border); border-radius:8px;
  font-size:14px; outline:none; flex:1; min-width:140px;
}
.filter-bar select:focus, .filter-bar input:focus { border-color:var(--cp-primary-light); }
.btn-search {
  padding:10px 24px; background:var(--cp-primary); color:#fff;
  border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;
}
.btn-search:hover { background:var(--cp-primary-light); }
.results { padding:32px 24px 64px; max-width:1200px; margin:0 auto; }
.talent-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; }
.talent-card {
  background:#fff; border-radius:12px; padding:24px; box-shadow:var(--cp-shadow);
  border:1px solid var(--cp-bg-soft); transition:0.25s;
}
.talent-card:hover { transform:translateY(-4px); box-shadow:var(--cp-shadow-hover); }
.tc-head { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.tc-avatar {
  width:48px; height:48px; border-radius:50%;
  background:linear-gradient(135deg,var(--cp-primary),var(--cp-primary-light));
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:18px;
}
.tc-name { font-size:16px; font-weight:700; color:var(--cp-text-dark); }
.tc-sub { font-size:12px; color:var(--cp-text-light); }
.tc-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px; }
.tc-scores {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
  padding:12px 0; border-top:1px solid var(--cp-bg-soft);
  border-bottom:1px solid var(--cp-bg-soft); margin-bottom:14px;
}
.tc-scores .s { text-align:center; }
.tc-scores .s .v { font-weight:700; color:var(--cp-primary); font-size:16px; }
.tc-scores .s .l { font-size:11px; color:var(--cp-text-light); }
.tc-actions { display:flex; gap:8px; }
.tc-actions button { flex:1; }
.empty { text-align:center; padding:60px; color:var(--cp-text-light); font-size:14px; }
</style>
</head>
<body>
<script src="data-model.js"></script>
<script>CP.boot();</script>
<nav class="cp-navbar">
  <div class="cp-nav-inner">
    <a href="capability-platform.html" class="cp-nav-brand">思德库</a>
    <div class="cp-nav-links" id="navLinks">
      <a href="capability-platform.html">首页</a>
      <a href="find-talent.html" style="color:var(--cp-primary);font-weight:600;">能力档案</a>
      <a href="login.html" class="cp-nav-cta" id="navLoginBtn">登录</a>
    </div>
  </div>
</nav>
<section class="hero-ft">
  <h1>能力档案浏览</h1>
  <p>查看经过验证的专业人才能力档案。查看完整证据链或发起合作需登录。</p>
</section>
<section class="filter-section">
  <div class="filter-bar">
    <input type="text" id="fKeyword" placeholder="搜索姓名...">
    <select id="fRegion"><option value="">所有区域</option></select>
    <select id="fLevel"><option value="">所有等级</option></select>
    <select id="fDomain"><option value="">所有领域</option></select>
    <button class="btn-search" onclick="doSearch()">搜索</button>
  </div>
</section>
<section class="results">
  <div id="talentGrid" class="talent-grid"></div>
</section>
<footer class="cp-footer" style="padding:24px;text-align:center;">
  <div class="cp-footer-bottom">
    <p>本平台数据仅供参考，专业人员资质以官方认证为准。</p>
    <p>&copy; <span id="year"></span> CareProof AI · 思德库</p>
  </div>
</footer>
<script src="find-talent.js"></script>
</body>
</html>
