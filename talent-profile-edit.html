<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编辑能力档案 · CareProof AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
.page-wrap { max-width:820px; margin:0 auto; padding:40px 24px; }
.page-title { font-family:'Noto Serif SC',serif; font-size:26px; color:var(--cp-text-dark);
  margin-bottom:8px; font-weight:700; }
.page-desc { font-size:14px; color:var(--cp-text-light); margin-bottom:32px; line-height:1.7; }
.form-card { background:#fff; border-radius:var(--cp-radius-lg); padding:32px;
  box-shadow:var(--cp-shadow); border:1px solid var(--cp-bg-soft); }
.domain-tags { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.domain-tag {
  padding:6px 14px; border:1.5px solid var(--cp-border); border-radius:16px;
  font-size:13px; cursor:pointer; transition:0.2s; user-select:none;
  background:var(--cp-bg-gray);
}
.domain-tag:hover { border-color:var(--cp-primary-light); }
.domain-tag.selected {
  background:var(--cp-primary); color:#fff; border-color:var(--cp-primary);
}
.submit-row { margin-top:24px; display:flex; gap:12px; justify-content:flex-end; }
</style>
</head>
<body>
<script src="data-model.js"></script>
<script>
CP.boot();
if (!CP.requireRole('talent')) {}
</script>
<nav class="cp-navbar">
  <div class="cp-nav-inner">
    <a href="capability-platform.html" class="cp-nav-brand">思德库</a>
    <div class="cp-nav-links">
      <a href="talent-workspace.html">工作台</a>
      <a href="talent-profile-edit.html" style="color:var(--cp-primary);font-weight:600;">编辑档案</a>
      <button class="cp-nav-logout" onclick="CP.logout()">退出</button>
    </div>
  </div>
</nav>
<div class="page-wrap">
  <h1 class="page-title">编辑能力档案</h1>
  <p class="page-desc">
    完善您的基础信息和擅长领域。能力评分由已核验的证据自动计算，请通过"提交证据"来提升评分。
  </p>
  <div class="form-card">
    <div class="cp-form-row">
      <div class="cp-form-group">
        <label class="cp-form-label">姓名<span class="required">*</span></label>
        <input class="cp-form-input" id="pName">
      </div>
      <div class="cp-form-group">
        <label class="cp-form-label">从业年限</label>
        <input class="cp-form-input" id="pYears" type="number" min="0" max="50">
      </div>
    </div>
    <div class="cp-form-row">
      <div class="cp-form-group">
        <label class="cp-form-label">所在地区</label>
        <select class="cp-form-select" id="pRegion">
          <option value="beijing">北京市</option>
          <option value="shanghai">上海市</option>
          <option value="guangzhou">广州市</option>
          <option value="shenzhen">深圳市</option>
          <option value="chengdu">成都市</option>
          <option value="hangzhou">杭州市</option>
        </select>
      </div>
      <div class="cp-form-group">
        <label class="cp-form-label">评估师等级</label>
        <select class="cp-form-select" id="pLevel">
          <option value="senior">高级</option>
          <option value="mid">中级</option>
          <option value="junior">初级</option>
        </select>
      </div>
    </div>
    <div class="cp-form-group">
      <label class="cp-form-label">证书编号</label>
      <input class="cp-form-input" id="pCertNo" placeholder="如 GJ-2020-001">
    </div>
    <div class="cp-form-group">
      <label class="cp-form-label">个人简介</label>
      <textarea class="cp-form-textarea" id="pBio" rows="3"
        placeholder="简要介绍您的专业背景和擅长方向"></textarea>
    </div>
    <div class="cp-form-group">
      <label class="cp-form-label">擅长能力领域（可多选）</label>
      <div class="domain-tags" id="domainTags"></div>
      <div class="cp-form-hint">选择您擅长的能力领域，AI 将据此进行匹配</div>
    </div>
    <div class="submit-row">
      <a href="talent-workspace.html" class="cp-btn cp-btn-ghost">返回</a>
      <button class="cp-btn cp-btn-primary" onclick="savePr()">保存档案</button>
    </div>
  </div>
</div>
<script src="talent-profile-edit.js"></script>
</body>
</html>
