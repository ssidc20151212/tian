            { name: "培训课程3 饮食照护", units: ["协助长期照护对象进食、进水","常见膳食种类和摄入量需求的评估及异常情况的记录报告"] },

            { tag: "培训课程2", title: "穿脱衣物", desc: "穿脱衣服鞋袜、穿戴简易矫形器等辅助器具", video: "output/视频ltc-1-2-穿脱衣物.mp4", audio: "output/视频ltc-1-2-穿脱衣物.mp3" },

            { tag: "培训课程4", title: "排泄照护", desc: "床上便器与如厕协助、护理垫纸尿裤更换、排泄物观察记录", video: "output/视频ltc-1-4-排泄照护.mp4", audio: "output/视频ltc-1-4-排泄照护.mp3" }
        ]
    },
    {
        num: "职业模块2",
        title: "基础护理",
        courses: [
            { name: "培训课程1 生命体征及血糖的测量", units: ["生命体征的测量","血糖的测量"] },
            { name: "培训课程2 基础感染防控", units: ["保持手卫生和正确使用防护用品"] }
        ],
        videos: [
            { tag: "培训课程1", title: "生命体征及血糖的测量", desc: "体温、脉搏、呼吸、血压测量及血糖监测操作规范", video: "output/视频ltc-2-1-生命体征及血糖测量.mp4", audio: "output/视频ltc-2-1-生命体征及血糖测量.mp3" },

        ]
    },

        ]
    }
];

const container = document.getElementById('courseContent');
modules.forEach(mod => {
    let html = '';
    // 模块标题
    html += `<div class="module-section">`;
    html += `<div class="module-header"><span class="module-num">${mod.num}</span><h2 class="module-title">${mod.title}</h2></div>`;
    // 课程大纲
    html += `<div class="module-outline">`;
    mod.courses.forEach(c => {
        html += `<div class="outline-course"><h4>${c.name}</h4><ul>`;
        c.units.forEach(u => { html += `<li>${u}</li>`; });
        html += `</ul></div>`;
    });
    html += `</div>`;
    // 对应视频
    html += `<div class="video-grid">`;
    mod.videos.forEach(v => {
        html += `
        <div class="video-card">
            <video controls preload="metadata"><source src="${v.video}" type="video/mp4"></video>
            <div class="card-body">
                <span class="tag">${v.tag}</span>
                <h4>${v.title}</h4>
                <p>${v.desc}</p>
            </div>
            <div class="card-audio">
                <audio controls preload="none"><source src="${v.audio}" type="audio/mpeg"></audio>
            </div>
        </div>`;
    });
    html += `</div></div>`;
    container.innerHTML += html;
});
</script>
